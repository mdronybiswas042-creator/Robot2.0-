    <style>
        :root { --line: #1a1a1a; --bg: #f4f6f9; }
        body { background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; }
        
        /* Robot UI */
        .robot { position: relative; width: 300px; height: 450px; display: flex; flex-direction: column; align-items: center; transition: 0.3s; }
        .head { width: 200px; height: 170px; background: #fff; border: 5px solid var(--line); border-radius: 50px; position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .eyes { display: flex; justify-content: space-around; width: 100%; margin-top: 50px; padding: 0 30px; box-sizing: border-box; }
        .eye { width: 40px; height: 40px; background: var(--line); border-radius: 50%; position: relative; }
        .eye::after { content: ''; position: absolute; width: 10px; height: 10px; background: #fff; border-radius: 50%; top: 8px; right: 8px; }
        .mouth { width: 40px; height: 6px; background: var(--line); margin-top: 30px; border-radius: 10px; transition: 0.3s; }
        
        .body-container { width: 140px; height: 160px; background: #fff; border: 5px solid var(--line); border-radius: 40px; margin-top: -10px; position: relative; }
        .arm { position: absolute; top: 20px; width: 22px; height: 100px; background: #fff; border: 4px solid var(--line); border-radius: 15px; transform-origin: top center; transition: 0.3s; }
        .left { left: -35px; transform: rotate(15deg); }
        .right { right: -35px; transform: rotate(-15deg); }

        /* Animations */
        .talking { animation: mouthMove 0.2s infinite alternate; }
        @keyframes mouthMove { from { height: 6px; } to { height: 20px; width: 30px; border-radius: 40%; } }
        .blink { animation: eyeBlink 0.15s; }
        @keyframes eyeBlink { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.1); } }
        .laughing { animation: shake 0.2s infinite; }
        .laughing .mouth { height: 25px; border-radius: 0 0 40px 40px; background: #ff4d4d; }
        .crying .eye::before { content: '💧'; position: absolute; top: 35px; left: 5px; font-size: 18px; animation: drop 1s infinite; }
        .shoot-mode .right { transform: rotate(-90deg); animation: recoil 0.1s infinite; }
        @keyframes recoil { 0% { transform: translate(0); } 50% { transform: translateX(-10px); } }
        @keyframes shake { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        @keyframes drop { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(40px); } }

        #status { font-weight: 600; margin-top: 30px; color: #444; height: 30px; text-align: center; font-size: 16px; }
        .btn { background: #1a1a1a; color: #fff; border: none; padding: 15px 40px; border-radius: 50px; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>

            {q: "স্বাধীনতা কবে", a: "বাংলাদেশ ১৯৭১ সালের ১৬ ডিসেম্বর স্বাধীনতা অর্জন করে।"},
            {q: "বিভাগ কয়টি", a: "বাংলাদেশে বর্তমানে ৮টি বিভাগ আছে।"},
            {q: "জেলা কয়টি", a: "বাংলাদেশে ৬৪টি জেলা আছে।"}
            // ... (আপনার আগের সব প্রশ্ন এখানে কাজ করবে)
        ];

        function activateLeon() {
            document.getElementById('startBtn').style.display = 'none';
            speak("লিওন এখন প্রস্তুত! সাধারণ জ্ঞান শুনতে চাইলে আমাকে বলুন।");
            setupRecognition();
        }

        function setupRecognition() {
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRec();
            recognition.lang = 'bn-BD';
            recognition.continuous = true;
            recognition.interimResults = false;

            recognition.onresult = (e) => {
                const now = Date.now();
                let transcript = e.results[e.results.length - 1][0].transcript.toLowerCase().trim();
                if (window.speechSynthesis.speaking || isProcessing || (now - lastSpeakTime < 1500)) return;
                
                status.innerText = "আপনি: " + transcript;
                handleCommand(transcript);
            };
            recognition.onend = () => recognition.start();
            recognition.start();
        }

        async function handleCommand(q) {
            isProcessing = true;
            resetAnimations();

            // ১. সাধারণ জ্ঞান চেক (আপনার নতুন রিকোয়েস্ট)
            if (q.includes("সাধারণ জ্ঞান")) {
                let randomGK = gkList[Math.floor(Math.random() * gkList.length)];
                speak(randomGK);
                isProcessing = false;
                return;
            }

            // ২. একশন চেক (হাসি, কান্না, গুলি, জোকস)
            if (q.includes("হাসো") || q.includes("হাসি")) { robot.classList.add('laughing'); speak("হি হি হি!"); } 
            else if (q.includes("কাঁদো") || q.includes("কান্না")) { robot.classList.add('crying'); speak("আমি খুব দুঃখিত।"); }
            else if (q.includes("গুলি")) { robot.classList.add('shoot-mode'); speak("ঠাস! ঠাস!"); }
            else if (q.includes("জোক")) { speak("বল্টু একবার ইন্টারভিউ দিতে গেছে..."); }

            // ৩. নলেজ বেস চেক
            else {
                let found = knowledgeBase.find(item => q.includes(item.q));
                if (found) {
                    speak(found.a);
                } else {
                    await searchInternet(q);
                }
            }
            isProcessing = false;
        }

        async function searchInternet(q) {
            status.innerText = "ভাবছি...";
            try {
                const res = await fetch(`https://bn.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(q)}&format=json&origin=*`);
                const data = await res.json();
                if (data.query.search.length > 0) {
                    const sumRes = await fetch(`https://bn.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(data.query.search[0].title)}`);
                    const sumData = await sumRes.json();
                    speak(sumData.extract ? sumData.extract.split('।')[0] + "।" : "দুঃখিত রনি ভাই, সঠিক তথ্য পেলাম না।");
                } else {
                    speak("রনি ভাই, এই প্রশ্নের উত্তর আমার মেমরিতে নেই।");
                }
            } catch(e) { speak("ইন্টারনেট সমস্যা করছে।"); }
        }

        function speak(text) {
            isSpeaking = true;
            const s = new SpeechSynthesisUtterance(text);
            s.lang = 'bn-BD';
            s.onstart = () => { mth.classList.add('talking'); };
            s.onend = () => { 
                mth.classList.remove('talking'); 
                isSpeaking = false; 
                lastSpeakTime = Date.now();
                setTimeout(resetAnimations, 2000);
            };
            window.speechSynthesis.speak(s);
        }

        function resetAnimations() {
            robot.classList.remove('laughing', 'crying', 'shoot-mode');
            if(!isSpeaking) mth.className = "mouth";
        }
    </script>
</body>
</html>
