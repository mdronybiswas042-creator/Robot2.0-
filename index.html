<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leon - Smart Emotional AI Pet</title>
    <style>
        :root { --line: #1a1a1a; --bg: #f4f6f9; }
        body { background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        .robot { position: relative; width: 320px; height: 500px; display: flex; flex-direction: column; align-items: center; }
        .head { width: 210px; height: 185px; background: #fff; border: 5px solid var(--line); border-radius: 55px; position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .eyes { display: flex; justify-content: space-around; width: 100%; margin-top: 55px; padding: 0 30px; box-sizing: border-box; }
        .eye { width: 45px; height: 45px; background: var(--line); border-radius: 50%; position: relative; }
        .eye::after { content: ''; position: absolute; width: 12px; height: 12px; background: #fff; border-radius: 50%; top: 8px; right: 8px; }
        .blink { animation: fastBlink 0.15s; }
        @keyframes fastBlink { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.1); } }
        .mouth { width: 45px; height: 6px; background: var(--line); margin-top: 35px; border-radius: 10px; transition: 0.1s; }
        .talking { animation: mouthMove 0.18s infinite alternate !important; }
        @keyframes mouthMove { 0% { height: 6px; width: 45px; border-radius: 10px; } 100% { height: 24px; width: 35px; border-radius: 40%; } }
        .body-container { width: 155px; height: 175px; background: #fff; border: 5px solid var(--line); border-radius: 45px 45px 25px 25px; margin-top: -15px; position: relative; }
        .arm { position: absolute; top: 25px; width: 26px; height: 115px; background: #fff; border: 4px solid var(--line); border-radius: 15px; transform-origin: top center; transition: 0.5s; }
        .left { left: -42px; transform: rotate(18deg); }
        .right { right: -42px; transform: rotate(-18deg); }
        .hand { position: absolute; bottom: -38px; width: 60px; height: 50px; left: -20px; display: flex; justify-content: center; }
        .finger { width: 6px; height: 30px; background: var(--line); border-radius: 10px; margin: 0 1.2px; }
        
        .thinking-pose .right { transform: rotate(-140deg) translateY(-20px); }
        #status { font-weight: 600; margin-top: 40px; color: #444; height: 35px; text-align: center; font-size: 17px; }
        .btn { background: #1a1a1a; color: #fff; border: none; padding: 15px 45px; border-radius: 50px; cursor: pointer; margin-top: 20px; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

    <div class="robot" id="leonRobot">
        <div class="head">
            <div class="eyes"><div class="eye" id="lE"></div><div class="eye" id="rE"></div></div>
            <div class="mouth" id="mth"></div>
        </div>
        <div class="body-container">
            <div class="arm left" id="lA"><div class="hand"><div class="finger"></div><div class="finger"></div><div class="finger"></div><div class="finger"></div><div class="finger"></div></div></div>
            <div class="arm right" id="rA"><div class="hand"><div class="finger"></div><div class="finger"></div><div class="finger"></div><div class="finger"></div><div class="finger"></div></div></div>
        </div>
    </div>

    <div id="status">লিওন আপনার অপেক্ষায়...</div>
    <button class="btn" id="startBtn" onclick="activateLeon()">লিওনকে জাগান</button>

    <script>
        const status = document.getElementById('status'), mth = document.getElementById('mth'), robot = document.getElementById('leonRobot');
        const lE = document.getElementById('lE'), rE = document.getElementById('rE'), lA = document.getElementById('lA'), rA = document.getElementById('rA');
        
        let isSpeaking = false, isProcessing = false, lastSpeakTime = 0, recognition;
        const waitPhrases = ["দাঁড়াও তোমার প্রশ্নের উত্তরটা দিচ্ছি।", "একটু ভেবে নেই।", "একটু ওয়েট করো রনি ভাই।"];

        const brain = [
            {keys: ["নাম", "কে তুমি", "কে তুই"], ans: "আমার নাম লিয়ন।"},
            {keys: ["তৈরি", "বানিয়েছে", "উদ্বোধন", "জন্ম"], ans: "আমাকে রনি ভাই তৈরি করেছে।"},
            {keys: ["বাড়ি", "ঠিকানা", "থাকো", "চিতলমারী"], ans: "আমার বাড়ি বাগেরহাটের চিতলমারী উপজেলায়।"},
            {keys: ["রনি কে", "রনি ভাই কে", "রনিকে চেনো"], ans: "রনি তো সে যে আমাকে তৈরি করেছে।"},
            {keys: ["রনি কেমন", "রনি কেমন ছেলে"], ans: "রনি ভাইকে তো ভদ্রলোক বলে জানি, বাকিটা আল্লাহ জানে।"},
            {keys: ["কেমন আছো", "কেমন আছ"], ans: "আলহামদুলিল্লাহ ভালো আছি, তুমি?"},
            {keys: ["কি অবস্থা", "কী খবর"], ans: "এইতো আলহামদুলিল্লাহ, তোমার কী অবস্থা?"}
        ];

        function activateLeon() {
            document.getElementById('startBtn').style.display = 'none';
            speak("আসসালামু আলাইকুম রনি ভাই! আমি এখন আপনার সব কথা শুনতে প্রস্তুত।");
            setupRecognition();
        }

        function setupRecognition() {
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRec();
            recognition.lang = 'bn-BD';
            recognition.continuous = true;
            recognition.interimResults = false; // আপনার কথা পূর্ণাঙ্গভাবে শোনার জন্য false করা হয়েছে

            recognition.onresult = (e) => {
                const now = Date.now();
                let transcript = e.results[e.results.length - 1][0].transcript.toLowerCase().trim();
                
                // ১. স্টপ কমান্ড (যেকোনো সময় কাজ করবে)
                if (transcript.includes("থামো") || transcript.includes("স্টপ") || transcript.includes("stop")) {
                    window.speechSynthesis.cancel();
                    isSpeaking = false; isProcessing = false;
                    resetAnimations();
                    return;
                }

                // ২. সেলফ-লিসেনিং ফিল্টার (লিওন কথা শেষ করার ২ সেকেন্ড পর্যন্ত ইনপুট নিবে না)
                if (window.speechSynthesis.speaking || isProcessing || (now - lastSpeakTime < 2000)) return;

                if (transcript.length > 2) {
                    status.innerText = "আপনি: " + transcript;
                    handleCommand(transcript);
                }
            };

            recognition.onend = () => { try { recognition.start(); } catch(err) {} };
            recognition.start();
        }

        async function handleCommand(q) {
            isProcessing = true;
            
            // কি-ওয়ার্ড নিখুঁতভাবে চেক করা
            let found = brain.find(item => item.keys.some(k => q.includes(k)));
            
            if (found) {
                speak(found.ans);
                isProcessing = false;
                return;
            }

            // যদি প্রশংসা হয়
            if (q.includes("সুন্দর") || q.includes("ভালো") || q.includes("ধন্যবাদ")) {
                speak("ধন্যবাদ রনি ভাই!");
                isProcessing = false; return;
            }

            // ইন্টারনেট সার্চ
            status.innerText = "ইন্টারনেটে খুঁজছি...";
            robot.classList.add('thinking-pose');
            
            // ওয়েট ফ্রেজ বলা
            await new Promise(resolve => {
                const phrase = waitPhrases[Math.floor(Math.random() * waitPhrases.length)];
                const s = new SpeechSynthesisUtterance(phrase);
                s.lang = 'bn-BD';
                s.onend = resolve;
                window.speechSynthesis.speak(s);
            });

            try {
                const res = await fetch(`https://bn.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(q)}&format=json&origin=*`);
                const data = await res.json();
                
                if (data.query.search.length > 0) {
                    const title = data.query.search[0].title;
                    const summaryRes = await fetch(`https://bn.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`);
                    const summaryData = await summaryRes.json();
                    speak(summaryData.extract ? summaryData.extract.split('।')[0] + "।" : "বিস্তারিত পেলাম না রনি ভাই।");
                } else {
                    speak("রনি ভাই, এই প্রশ্নের উত্তর আমার জানা নেই।");
                }
            } catch(e) {
                speak("ইন্টারনেট কানেকশন চেক করুন।");
            }
            isProcessing = false;
        }

        function speak(text) {
            isSpeaking = true;
            const s = new SpeechSynthesisUtterance(text);
            s.lang = 'bn-BD';
            s.onstart = () => { mth.classList.add('talking'); lA.style.animation = "talk 0.5s infinite alternate"; };
            s.onend = () => { 
                mth.classList.remove('talking'); 
                lA.style.animation = ""; 
                isSpeaking = false; 
                lastSpeakTime = Date.now(); // কথা শেষ হওয়ার সময় সেভ করা হলো
                resetAnimations();
            };
            window.speechSynthesis.speak(s);
        }

        function resetAnimations() {
            robot.classList.remove('thinking-pose');
            lE.classList.remove('blink'); rE.classList.remove('blink');
            if(!isSpeaking) mth.className = "mouth";
        }

        setInterval(() => {
            if(!isSpeaking && !isProcessing && Math.random() < 0.3) {
                lE.classList.add('blink'); rE.classList.add('blink');
                setTimeout(() => { lE.classList.remove('blink'); rE.classList.remove('blink'); }, 500);
            }
        }, 5000);
    </script>
    <style> @keyframes talk { from { transform: rotate(10deg); } to { transform: rotate(35deg); } } </style>
</body>
</html>
