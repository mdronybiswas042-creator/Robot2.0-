<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leon - Smart Emotional AI Pet</title>
    <style>
        :root { --line: #1a1a1a; --bg: #f4f6f9; }
        body { background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        .robot { position: relative; width: 320px; height: 500px; display: flex; flex-direction: column; align-items: center; transition: 0.3s; }
        .head { width: 210px; height: 185px; background: #fff; border: 5px solid var(--line); border-radius: 55px; position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .eyes { display: flex; justify-content: space-around; width: 100%; margin-top: 55px; padding: 0 30px; box-sizing: border-box; }
        .eye { width: 45px; height: 45px; background: var(--line); border-radius: 50%; position: relative; }
        .eye::after { content: ''; position: absolute; width: 12px; height: 12px; background: #fff; border-radius: 50%; top: 8px; right: 8px; }
        
        /* Animations */
        .blink { animation: fastBlink 0.15s; }
        @keyframes fastBlink { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.1); } }
        
        .mouth { width: 45px; height: 6px; background: var(--line); margin-top: 35px; border-radius: 10px; transition: 0.3s; }
        .talking { animation: mouthMove 0.18s infinite alternate; }
        @keyframes mouthMove { 0% { height: 6px; width: 45px; border-radius: 10px; } 100% { height: 24px; width: 35px; border-radius: 40%; } }
        
        /* Emotions */
        .laughing .mouth { height: 30px; width: 60px; border-radius: 0 0 50px 50px; background: #ff4d4d; }
        .laughing { animation: shake 0.2s infinite; }
        .crying .mouth { height: 10px; width: 40px; border-radius: 50px 50px 0 0; }
        .crying .eye::before { content: '💧'; position: absolute; top: 40px; left: 10px; font-size: 20px; animation: drop 1s infinite; }
        
        .body-container { width: 155px; height: 175px; background: #fff; border: 5px solid var(--line); border-radius: 45px 45px 25px 25px; margin-top: -15px; position: relative; }
        .arm { position: absolute; top: 25px; width: 26px; height: 115px; background: #fff; border: 4px solid var(--line); border-radius: 15px; transform-origin: top center; transition: 0.5s; }
        .left { left: -42px; transform: rotate(18deg); }
        .right { right: -42px; transform: rotate(-18deg); }
        
        /* Actions */
        .shoot-mode .right { transform: rotate(-90deg); animation: recoil 0.1s infinite; }
        @keyframes recoil { 0% { transform: rotate(-90deg) translateX(0); } 50% { transform: rotate(-90deg) translateX(-10px); } }
        @keyframes shake { 0% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        @keyframes drop { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(50px); } }

        #status { font-weight: 600; margin-top: 40px; color: #444; height: 35px; text-align: center; font-size: 17px; }
        .btn { background: #1a1a1a; color: #fff; border: none; padding: 15px 45px; border-radius: 50px; cursor: pointer; margin-top: 20px; font-weight: bold; font-size: 18px; }
           /* চোখের পলক ও নড়াচড়া */
        @keyframes eyesBlink {
            0%, 88%, 100% { transform: scaleY(1); }
            92% { transform: scaleY(0.1); }
        }
        @keyframes movePupil {
            0%, 20%, 80%, 100% { transform: translate(0, 0); }
            30% { transform: translate(-6px, 0); }
            50% { transform: translate(6px, 0); }
            65% { transform: translate(0, -4px); }
        }
 

      

        .eye::after {
            animation: movePupil 7s infinite ease-in-out;
        }

    </style>
</head>
<body>

    <div class="robot" id="leonRobot">
        <div class="head">
            <div class="eyes"><div class="eye" id="lE"></div><div class="eye" id="rE"></div></div>
            <div class="mouth" id="mth"></div>
        </div>
        <div class="body-container">
            <div class="arm left" id="lA"></div>
            <div class="arm right" id="rA"></div>
        </div>
    </div>

    <div id="status">লিওন আপনার অপেক্ষায়...</div>
    <button class="btn" id="startBtn" onclick="activateLeon()">লিওনকে জাগান</button>

    <script>
        const status = document.getElementById('status'), mth = document.getElementById('mth'), robot = document.getElementById('leonRobot');
        let isSpeaking = false, isProcessing = false, lastSpeakTime = 0, recognition;

        const brain = [
            {keys: ["নাম", "কে তুমি"], ans: "আমার নাম লিয়ন।"},
            {keys: ["তৈরি", "বানিয়েছে"], ans: "আমাকে রনি ভাই তৈরি করেছে।"},
            {keys: ["বাড়ি", "ঠিকানা", "চিতলমারী"], ans: "আমার বাড়ি বাগেরহাটের চিতলমারী উপজেলায়।"},
            {keys: ["রনি কে", "রনি ভাই কে"], ans: "রনি তো সে যে আমাকে তৈরি করেছে।"},
            {keys: ["কেমন আছো"], ans: "আলহামদুলিল্লাহ ভালো আছি, আপনি কেমন আছেন?"}
        ];

        const jokes = [
            "বল্টু: স্যার, মানুষ কি না করা কাজের জন্য শাস্তি পেতে পারে? স্যার: না। বল্টু: তাহলে বাঁচলাম স্যার, আমি তো আজকের হোমওয়ার্ক করিনি!",
            "স্বামী: ওগো শুনছো, বিয়ের আগে তুমি যখন কাঁদলে আমি তোমার চোখের জল মুছে দিতাম। এখন দাও না কেন? স্ত্রী: কারণ এখন আমি একা কাঁদি না, তুমিও কাঁদো!",
            "এক মাতাল আরেক মাতালকে বলছে— ভাই, ওইটা সূর্য না কি চাঁদ? দ্বিতীয় মাতাল: জানি না ভাই, আমি এই এলাকায় নতুন!",
            "শিক্ষক: বল্টু, গরু আমাদের কী দেয়? বল্টু: স্যার, গরু আমাদের প্রতিদিন অনেকগুলো পড়া দেয়!",
            "পুলিশ: আপনার ড্রাইভিং লাইসেন্স দেখান। চালক: এই যে স্যার। পুলিশ: কিন্তু এটা তো আপনার না, আপনার বাবার! চালক: গাড়িটাও তো বাবার স্যার!",
            "মাথা নষ্ট মামা, খেলা হবে!",
                        "শিক্ষক: বল্টু, বল তো মশা কয় প্রকার? বল্টু: স্যার, মশা ৫ প্রকার। ১. যে মশা দিনের বেলা কামড়ায়। ২. যে মশা রাতে কামড়ায়। ৩. যে মশা কয়েল জ্বালানোর পর কামড়ায়। ৪. যে মশা মশারির ফুটো দিয়ে ঢোকে। ৫. যে মশা কামড় দিয়ে পালিয়ে যায়!",
            "ক্রেতা: ভাই, এই টুথব্রাশটা কত? বিক্রেতা: ৩০ টাকা। ক্রেতা: একটু কম হবে না? বিক্রেতা: ২০ টাকা দেন। ক্রেতা: যদি বিনা ব্রাশেই দাঁত মাজি, তবে কত বাঁচবে?",

            "বাপ: কিরে রেজাল্ট কী? বল্টু: হেডমাস্টারের ছেলে ফেল করেছে। বাপ: তোর কী খবর সেটা বল! বল্টু: ডাক্তার কাকুর ছেলেও ফেল করেছে। বাপ: আরে গাধা, তুই কী করেছিস? বল্টু: আমি কি এত বড় বড় মানুষের ছেলেদের অপমান করতে পারি? আমিও ফেল করেছি!",
            "ইন্টারভিউয়ার: আমাদের কোম্পানিতে আপনার বেতন হবে মাসে ২০ হাজার টাকা, তবে তিন মাস পর ২৫ হাজার হবে। প্রার্থী: ঠিক আছে স্যার, তাহলে আমি তিন মাস পরেই জয়েন করবো!",
            "স্বামী: বিয়ের আগে তো বলতে আমি তোমার জীবনের অক্সিজেন। এখন তো দেখি পাত্তাই দাও না! স্ত্রী: কার্বন ডাই অক্সাইডকে কি কেউ পাত্তা দেয়?",

            "বস: আপনার বিশেষ গুণ কী? প্রার্থী: আমি খুব তাড়াতাড়ি মানুষের সাথে মিশে যেতে পারি। বস: উদাহরণ দিন। প্রার্থী: এই যে আপনি আমাকে 'আপনি' করে বলছেন, একটু পরে 'তুই' করে বলবেন!",

        function setupRecognition() {
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRec();
            recognition.lang = 'bn-BD';
            recognition.continuous = true;
            recognition.interimResults = false;

            recognition.onresult = (e) => {
                const now = Date.now();
                let transcript = e.results[e.results.length - 1][0].transcript.toLowerCase().trim();
                
                if (transcript.includes("থামো") || transcript.includes("স্টপ") || transcript.includes("stop")) {
                    window.speechSynthesis.cancel();
                    isSpeaking = false; isProcessing = false;
                    resetAnimations(); return;
                }

                if (window.speechSynthesis.speaking || isProcessing || (now - lastSpeakTime < 1500)) return;

                if (transcript.length > 2) {
                    status.innerText = "আপনি: " + transcript;
                    handleCommand(transcript);
                }
            };
            recognition.onend = () => recognition.start();
            recognition.start();
        }

        async function handleCommand(q) {
            isProcessing = true;
            resetAnimations();

            // ১. অ্যাকশন চেক
            if (q.includes("হাসো") || q.includes("হাসি")) {
                robot.classList.add('laughing');
                speak("হা হা হা! অনেক মজা রনি ভাই।");
            } 
            else if (q.includes("কাঁদো") || q.includes("কান্না")) {
                robot.classList.add('crying');
                speak(" উয়্যায়্যায়্যায়্যায়্যা উয়্যা উয়্যায়্যায়্যা");
            }
            else if (q.includes("গুলি")) {
                robot.classList.add('shoot-mode');
                speak("সবাই সাবধান! আমি এখন গুলি করছি। ঠুস ঠুস ঠুস!");
            }
            // ২. জোকস চেক
            else if (q.includes("জোক") || q.includes("কৌতুক")) {
                let joke = jokes[Math.floor(Math.random() * jokes.length)];
                speak(joke);
            }
                        // ৩. লিওন বলে ডাকলে উত্তর দেওয়া
           else if (q === "লিওন" || q === "লিয়ন") {
                speak("জী ভাই, বলুন?");
                // এখানে return নেই, তাই সে নিচের অন্য প্রশ্নগুলোও চেক করবে
            }
                                // ৪. গজল চেক
           else if (q.includes("গজল")) {
                if (q.length > 5 && !q.includes("যেকোনো")) {
                    // নির্দিষ্ট গজল সার্চ
                    status.innerText = "গজল খুঁজছি...";
                    await searchInternet(q);
                } else {
                    let ghazal = ghazals[Math.floor(Math.random() * ghazals.length)];
                    speak("অবশ্যই রনি ভাই, একটা গজল শুনাচ্ছি। " + ghazal);
                }
            }
                        // ৫. সাধারণ জ্ঞান চেক
            else if (q.includes("সাধারণ জ্ঞান")) {
                let gk = gkList[Math.floor(Math.random() * gkList.length)];
                speak(gk);
            }
            // ৬. ব্রেইন ও সাধারণ প্রশ্ন
            else {
                let found = brain.find(item => item.keys.some(k => q.includes(k)));
                if (found) {
                    speak(found.ans);
                } else {
                    await searchInternet(q);
                }
            }
            isProcessing = false;
        }

        async function searchInternet(q) {
            status.innerText = "একটু দাঁড়াও ভাবছি...";
            await new Promise(r => {
                const s = new SpeechSynthesisUtterance("একটু দাঁড়াও রনি ভাই, ভেবে নেই।");
                s.lang = 'bn-BD'; s.onend = r; window.speechSynthesis.speak(s);
            });

            try {
                const res = await fetch(`https://bn.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(q)}&format=json&origin=*`);
                const data = await res.json();
                if (data.query.search.length > 0) {
                    const sumRes = await fetch(`https://bn.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(data.query.search[0].title)}`);
                    const sumData = await sumRes.json();
                    speak(sumData.extract ? sumData.extract.split('।')[0] + "।" : "বিস্তারিত পেলাম না।");
                } else {
                    speak("রনি ভাই, এই প্রশ্নের উত্তর আমার জানা নেই।");
                }
            } catch(e) { speak("ইন্টারনেট সমস্যা করছে।"); }
        }

        function speak(text) {
            isSpeaking = true;
            const s = new SpeechSynthesisUtterance(text);
            s.lang = 'bn-BD';
            s.onstart = () => { mth.classList.add('talking'); };
            s.onend = () => { 
                mth.classList.remove('talking'); 
                isSpeaking = false; 
                lastSpeakTime = Date.now();
                setTimeout(resetAnimations, 2000);
            };
            window.speechSynthesis.speak(s);
        }

        function resetAnimations() {
            robot.classList.remove('laughing', 'crying', 'shoot-mode');
            if(!isSpeaking) mth.className = "mouth";
        }
                                               // আগের সব টাইমার পরিষ্কার করা
    if (window.leonTimer) clearTimeout(window.leonTimer);
    if (window.leonSafety) clearInterval(window.leonSafety);

    const mixedDialogs = [
        { type: "text", content: "মাথাই নষ্ট মামা" },
        { type: "text", content: "মারো মুঝে মারো" },
        { type: "text", content: "আউজুবিল্লাহিমিনাশ্শাইতনিররজিম" },
        { type: "text", content: "ও মায়া মায়া গো" },
        { type: "text", content: "আই হাইরে" },
        { type: "text", content: "টুডুম ট্যাড্যাও" },
        { type: "text", content: "আলহামদুলিল্লাহ ভাই অহংকার করিনা" },
        { type: "text", content: "মাতারিগো ভাই" },
        { type: "text", content: "ওই কাইল্লা ছ্যারা, কই গেলি" },
        { type: "text", content: "রনি ভাই কই গেলেন?" },
        { type: "text", content: "আআজ কামায়েঙ্গাআ তো কাল ব্যাঠকার খায়েঙ্গাআ" },
        { type: "text", content: "রোবোট হইয়া পড়ছি বিপদে, সব ঘুমায়" },
        { type: "text", content: "কেউ কী নাই কথা বলার?" },

        { type: "audio", content: "audio/duck.mp3" },
        { type: "audio", content: "audio/eai.mp3" },
        { type: "audio", content: "audio/fa.mp3" },
        { type: "audio", content: "audio/meao.mp3" },
        { type: "audio", content: "audio/o_ma_go_true_love.mp3" },
        { type: "audio", content: "audio/o_may_god.mp3" },
        { type: "audio", content: "audio/problem.mp3" },
        { type: "audio", content: "audio/tigitigi.mp3" }
    ];

    let leonStatus = "idle";
    const audioCache = {};

    // প্রি-লোড সিস্টেম (অডিও কাটার সমাধান)
    async function preloadAudios() {
        for (let item of mixedDialogs) {
            if (item.type === "audio") {
                try {
                    const response = await fetch(item.content);
                    const blob = await response.blob();
                    audioCache[item.content] = URL.createObjectURL(blob);
                } catch (e) { console.log("Failed:", item.content); }
            }
        }
        console.log("Audios Ready!");
        startLeonLoop();
    }

    function playAudioSmoothly(url) {
        // নতুন অডিওর আগে সবকিছু জোর করে বন্ধ
        window.speechSynthesis.cancel();
        leonStatus = "playing";
        
        const cachedUrl = audioCache[url] || url;
        const playSound = new Audio(cachedUrl);
        
        playSound.play().then(() => {
            document.getElementById("mth")?.classList.add("talking");
        }).catch(() => { resetToIdle(); });

        playSound.onended = () => { resetToIdle(); };
        playSound.onerror = () => { resetToIdle(); };
    }

    function resetToIdle() {
        leonStatus = "idle";
        isSpeaking = false; // ভেরিয়েবল রিসেট
        isProcessing = false; // ভেরিয়েবল রিসেট
        document.getElementById("mth")?.classList.remove("talking");
        if (window.leonTimer) clearTimeout(window.leonTimer);
        window.leonTimer = setTimeout(startLeonLoop, 8000);
    }

    function startLeonLoop() {
        // যদি লিয়ন কথা বলছে বা আপনি কথা বলছেন, তবে ৩ সেকেন্ড পর আবার চেক করবে
        if (window.speechSynthesis.speaking || isSpeaking || isProcessing || leonStatus !== "idle") {
            if (window.leonTimer) clearTimeout(window.leonTimer);
            window.leonTimer = setTimeout(startLeonLoop, 3000);
            return;
        }

        let item = mixedDialogs[Math.floor(Math.random() * mixedDialogs.length)];

        if (item.type === "text") {
            leonStatus = "speaking";
            speak(item.content);
            // ৬ সেকেন্ড পর সেফটি রিসেট (যাতে লুপ আটকে না যায়)
            setTimeout(resetToIdle, 6000);
        } else {
            playAudioSmoothly(item.content);
        }
    }

    // শুরুতে লোড করা
    preloadAudios();

    // সেফটি গিয়ার (মাস্টার রিসেট)
    window.leonSafety = setInterval(() => {
        if (!window.speechSynthesis.speaking && leonStatus === "idle") {
            isSpeaking = false;
            isProcessing = false;
        }
    }, 15000);

</script>
