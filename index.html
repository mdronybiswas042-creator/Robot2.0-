<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leon AI - Rony's Companion</title>
    <style>
        :root { --line: #000; --skin: #fff; }
        body { background: #f0f0f0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Arial', sans-serif; }
        
        .robot { position: relative; width: 300px; height: 480px; display: flex; flex-direction: column; align-items: center; transition: 0.5s; }
        
        /* মাথা ও চোখ */
        .head { width: 180px; height: 170px; background: var(--skin); border: 4.5px solid var(--line); border-radius: 50%; position: relative; z-index: 10; transition: 0.4s; }
        .eyes { display: flex; justify-content: space-around; margin-top: 50px; padding: 0 15px; }
        .eye { width: 45px; height: 45px; background: var(--line); border-radius: 50%; position: relative; overflow: hidden; }
        .eye::after { content: ''; position: absolute; width: 100%; height: 100%; background: #fff; top: -100%; transition: 0.1s; }
        .blink::after { top: 0; }
        
        .mouth { width: 60px; height: 6px; background: var(--line); margin: 35px auto 0; border-radius: 10px; transition: 0.2s; }
        .talking { animation: talk 0.2s infinite alternate; }
        @keyframes talk { from { height: 6px; } to { height: 20px; border-radius: 40%; } }

        /* বডি ও হাত */
        .body { width: 135px; height: 155px; background: var(--skin); border: 4.5px solid var(--line); border-radius: 40px 40px 15px 15px; margin-top: -10px; position: relative; }
        .pocket { width: 32px; height: 38px; border: 2.5px solid var(--line); position: absolute; bottom: 20px; right: 15px; border-radius: 5px; }
        
        .arm { position: absolute; top: 15px; width: 22px; height: 115px; background: var(--skin); border: 3.5px solid var(--line); border-radius: 12px; transform-origin: top center; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 5; }
        .left { left: -35px; transform: rotate(15deg); }
        .right { right: -35px; transform: rotate(-15deg); }
        
        .hand { position: absolute; bottom: -45px; width: 55px; height: 50px; left: -18px; display: flex; justify-content: center; align-items: flex-start; }
        .finger { width: 7px; height: 32px; background: var(--line); border-radius: 8px; margin: 0 1.5px; transition: 0.2s; }

        /* মুভমেন্ট এনিমেশনসমূহ */
        .think-pose { transform: rotate(-130deg) !important; top: 10px !important; }
        .itch-pose { transform: rotate(-150deg) !important; }
        .pocket-pose { transform: rotate(-20deg) translateY(-10px) !important; right: 10px !important; }
        .gun-pose { transform: rotate(-90deg) !important; width: 40px !important; }
        .wave-fingers .finger { height: 15px; }

        #status { font-weight: bold; margin-top: 40px; color: #333; text-align: center; height: 25px; }
        .btn { background: #000; color: #fff; border: none; padding: 15px 45px; border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div class="robot" id="leoBody">
        <div class="head" id="leoHead"><div class="eyes"><div class="eye" id="lE"></div><div class="eye" id="rE"></div></div><div class="mouth" id="mth"></div></div>
        <div class="body">
            <div class="pocket"></div>
            <div class="arm left" id="lA"><div class="hand" id="lH">
                <div class="finger"></div><div class="finger"></div><div class="finger"></div><div class="finger"></div><div class="finger"></div>
            </div></div>
            <div class="arm right" id="rA"><div class="hand" id="rH">
                <div class="finger"></div><div class="finger"></div><div class="finger"></div><div class="finger"></div><div class="finger"></div>
            </div></div>
        </div>
        <p id="status">লিওন ঘুমাচ্ছে...</p>
        <button class="btn" id="startBtn" onclick="wakeUp()">লিওনকে জাগান</button>
    </div>

    <script>
        const status = document.getElementById('status'), mth = document.getElementById('mth');
        const lE = document.getElementById('lE'), rE = document.getElementById('rE'), rA = document.getElementById('rA'), lA = document.getElementById('lA');
        let speaking = false, recognition, idleTimer;

        // আপনার দেওয়া মেমোরি
        const memory = [
            {q: ["নাম", "তুমি কে", "কে তুমি"], a: "আমার নাম লিয়ন।"},
            {q: ["তৈরি", "বানিয়েছে"], a: "আমাকে রনি ভাই তৈরি করেছে।"},
            {q: ["বাড়ি", "থাকো", "ঠিকানা", "এসেছো"], a: "আমার বাড়ি বাগেরহাটের চিতলমারী উপজেলায়।"},
            {q: ["রনি কে", "রনি ভাইকে"], a: "রনি তো সে যে আমাকে তৈরি করেছে।"},
            {q: ["রনি কেমন", "রনি ভাই সম্পর্কে"], a: "রনি ভাইকে তো ভদ্রলোক বলে জানি, বাকিটা আল্লাহ জানে।"},
            {q: ["কেমন আছো"], a: "আলহামদুলিল্লাহ ভালো আছি, তুমি?"},
            {q: ["কি অবস্থা", "কী খবর"], a: "এইতো আলহামদুলিল্লাহ, তোমার কী অবস্থা?"},
            {q: ["সুন্দর", "ভালো", "চমৎকার", "ধন্যবাদ"], a: "ধন্যবাদ! আপনিও অনেক চমৎকার মানুষ।"}
        ];

        function wakeUp() {
            document.getElementById('startBtn').style.display = 'none';
            speak("আসসালামু আলাইকুম রনি ভাই! আমি লিওন আপনার সব কথা শোনার জন্য তৈরি।");
            startIdleBehavior();
            setupMic();
        }

        function setupMic() {
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRec();
            recognition.lang = 'bn-BD';
            recognition.continuous = true;
            recognition.onresult = (e) => {
                const text = e.results[e.results.length - 1][0].transcript.trim();
                status.innerText = "আপনি: " + text;
                if(text.includes("থামো") || text.includes("স্টপ")) { 
                    speak("ঠিক আছে রনি ভাই, আমি চুপ হয়ে গেলাম।"); 
                    recognition.stop(); 
                    return; 
                }
                handle(text);
            };
            recognition.onend = () => { if(!speaking) recognition.start(); };
            recognition.start();
        }

        function handle(text) {
            let found = false;
            memory.forEach(item => {
                item.q.forEach(key => {
                    if(text.includes(key)) { speak(item.a); found = true; }
                });
            });

            if(!found) {
                status.innerText = "লিওন ভাবছে...";
                actionThink();
                setTimeout(() => fetchInfo(text), 1000);
            }
        }

        async function fetchInfo(q) {
            try {
                const res = await fetch(`https://bn.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(q)}`);
                const data = await res.json();
                speak(data.extract ? data.extract.split('.')[0] + "।" : "রনি ভাই, এটার উত্তর আমি জানি না। অন্য কিছু জিজ্ঞেস করুন।");
            } catch(e) { speak("ইন্টারনেট কানেকশনে সমস্যা হচ্ছে রনি ভাই।"); }
        }

        function speak(text) {
            speaking = true;
            window.speechSynthesis.cancel();
            const s = new SpeechSynthesisUtterance(text);
            s.lang = 'bn-BD';
            s.onstart = () => { 
                mth.classList.add('talking');
                talkMovement();
            };
            s.onend = () => { 
                mth.classList.remove('talking'); 
                resetArms();
                speaking = false;
            };
            window.speechSynthesis.speak(s);
        }

        // মুভমেন্ট লজিক
        function talkMovement() {
            lA.style.transform = "rotate(40deg) translateY(-5px)";
            rA.style.transform = "rotate(-40deg) translateY(-5px)";
        }

        function resetArms() {
            lA.style.transform = "rotate(15deg)";
            rA.style.transform = "rotate(-15deg)";
            lA.className = "arm left"; rA.className = "arm right";
        }

        function actionThink() { rA.classList.add('think-pose'); }

        function startIdleBehavior() {
            setInterval(() => {
                if(!speaking) {
                    const r = Math.random();
                    resetArms();
                    if(r < 0.2) rA.classList.add('itch-pose'); // মাথা চুলকানো
                    else if(r < 0.4) rA.classList.add('gun-pose'); // গুলি করা
                    else if(r < 0.6) lA.classList.add('pocket-pose'); // পকেটে হাত
                    else if(r < 0.8) document.getElementById('rH').classList.add('wave-fingers'); // আঙুল নাড়ানো
                    
                    setTimeout(resetArms, 3000);
                }
                // পলক ফেলা
                lE.classList.add('blink'); rE.classList.add('blink');
                setTimeout(()=> { lE.classList.remove('blink'); rE.classList.remove('blink'); }, 200);
            }, 6000);
        }
    </script>
</body>
</html>
