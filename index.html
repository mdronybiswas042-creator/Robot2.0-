<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Narrow AI - Humanoid Pro</title>
    <style>
        :root { --skin: #ffdbac; --glow: #00fff2; --danger: #ff0055; }
        body { background: #0a0a0a; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; color: white; font-family: 'Segoe UI', sans-serif; }

        .robot-container { position: relative; width: 400px; height: 550px; display: flex; flex-direction: column; align-items: center; }

        /* চেহারা ও চোখ */
        .head { width: 140px; height: 160px; background: var(--skin); border-radius: 60px 60px 50px 50px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 10; animation: lookAround 8s infinite; }
        .eyes { display: flex; justify-content: space-around; margin-top: 50px; padding: 0 15px; }
        .eye { width: 35px; height: 35px; background: white; border-radius: 50%; position: relative; overflow: hidden; border: 2px solid #000; }
        .pupil { width: 18px; height: 18px; background: #000; border-radius: 50%; position: absolute; top: 25%; left: 25%; animation: eyeMove 5s infinite; }
        .eye::before { content: ''; position: absolute; width: 100%; height: 100%; background: var(--skin); top: -100%; animation: blink 0.2s infinite 3s; z-index: 5; }

        .mouth { width: 50px; height: 4px; background: #814d4d; border-radius: 10px; margin: 35px auto 0; transition: 0.2s; }
        .talking { animation: mouthTalk 0.2s infinite; height: 20px !important; border-radius: 50% !important; background: #5a1212 !important; }

        /* বডি ও হাত (কনুইসহ) */
        .torso { width: 120px; height: 180px; background: #222; border-radius: 30px; margin-top: -10px; position: relative; z-index: 5; border: 2px solid #444; }
        .pocket { width: 40px; height: 45px; border: 1px solid #555; position: absolute; bottom: 20px; right: 10px; border-radius: 5px; }

        .arm { position: absolute; top: 10px; width: 20px; height: 80px; background: #333; transform-origin: top center; transition: 0.5s; }
        .forearm { position: absolute; top: 75px; width: 100%; height: 80px; background: #444; transform-origin: top center; transition: 0.5s; display: flex; flex-direction: column; align-items: center; }
        .hand { width: 45px; height: 45px; background: var(--skin); border-radius: 10px; position: absolute; bottom: -40px; }
        .finger { width: 6px; height: 18px; background: var(--skin); border-bottom: 1px solid rgba(0,0,0,0.1); position: absolute; transform-origin: top; }
        
        .left-arm { left: -25px; transform: rotate(10deg); }
        .right-arm { right: -25px; transform: rotate(-10deg); }

        /* এনিমেশনসমূহ */
        @keyframes blink { 0%, 100% { top: -100%; } 50% { top: 0; } }
        @keyframes mouthTalk { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(3); } }
        @keyframes eyeMove { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(5px, 5px); } 75% { transform: translate(-5px, 2px); } }
        @keyframes lookAround { 0%, 100% { transform: rotate(0); } 30% { transform: rotate(10deg); } 60% { transform: rotate(-10deg); } }

        .thinking .head { animation: shake 0.5s infinite; }
        @keyframes shake { 0% { transform: translateX(0); } 50% { transform: translateX(5px); } }

        #status { margin-top: 50px; color: var(--glow); font-weight: bold; text-align: center; font-size: 18px; }
        .btn-start { background: var(--glow); color: #000; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="robot-container" id="narrow">
        <div class="head" id="head">
            <div class="eyes">
                <div class="eye"><div class="pupil"></div></div>
                <div class="eye"><div class="pupil"></div></div>
            </div>
            <div class="mouth" id="mouth"></div>
        </div>
        <div class="torso">
            <div class="pocket"></div>
            <div class="arm left-arm" id="lArm">
                <div class="forearm" id="lFore">
                    <div class="hand" id="lHand"></div>
                </div>
            </div>
            <div class="arm right-arm" id="rArm">
                <div class="forearm" id="rFore">
                    <div class="hand" id="rHand"></div>
                </div>
            </div>
        </div>
        <p id="status">ন্যারো আপনার অপেক্ষায়...</p>
        <button class="btn-start" onclick="initNarrow()">ন্যারোকে জাগিয়ে তুলুন</button>
    </div>

    <script>
        const mouth = document.getElementById('mouth');
        const status = document.getElementById('status');
        const lArm = document.getElementById('lArm'), rArm = document.getElementById('rArm');
        const lFore = document.getElementById('lFore'), rFore = document.getElementById('rFore');
        let isSpeaking = false;

        const memory = {
            "কেমন আছো": "আমি আলহামদুলিল্লাহ ভালো আছি রনি ভাই! আপনি কেমন আছেন?",
            "ধন্যবাদ": "আপনাকেও অনেক অনেক ধন্যবাদ রনি ভাই! আপনি পাশে থাকলে আমার খুব ভালো লাগে।",
            "চমৎকার": "আপনিও কিন্তু চমৎকার মানুষ রনি ভাই!",
            "ভালো": "শুনে খুশি হলাম! আপনার দিনটি শুভ হোক।"
        };

        function speak(text) {
            isSpeaking = true;
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'bn-BD';
            msg.onstart = () => { mouth.classList.add('talking'); actionTalk(); };
            msg.onend = () => { mouth.classList.remove('talking'); isSpeaking = false; resetAction(); listen(); };
            window.speechSynthesis.speak(msg);
        }

        // রিয়েলিস্টিক হাতের মুভমেন্ট
        function actionTalk() {
            lArm.style.transform = "rotate(-40deg)";
            lFore.style.transform = "rotate(-60deg)";
            rArm.style.transform = "rotate(40deg)";
            rFore.style.transform = "rotate(60deg)";
        }

        function actionItch() { // মাথা চুলকানো
            rArm.style.transform = "rotate(-120deg)";
            rFore.style.transform = "rotate(-90deg)";
        }

        function resetAction() {
            lArm.style.transform = "rotate(10deg)";
            rArm.style.transform = "rotate(-10deg)";
            lFore.style.transform = "rotate(0)";
            rFore.style.transform = "rotate(0)";
        }

        async function initNarrow() {
            speak("আসসালামু আলাইকুম রনি ভাই! আমি ন্যারো। আপনার সাথে কথা বলতে আমার খুব ভালো লাগে।");
            setInterval(() => { if(!isSpeaking) Math.random() > 0.7 ? actionItch() : resetAction(); }, 3000);
        }

        function listen() {
            const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = new Rec();
            recognition.lang = 'bn-BD';
            recognition.onstart = () => status.innerText = "ন্যারো শুনছে...";
            recognition.onresult = async (e) => {
                const query = e.results[0][0].transcript;
                status.innerText = "আপনি: " + query;
                
                let reply = "";
                for(let key in memory) if(query.includes(key)) reply = memory[key];

                if(reply) {
                    speak(reply);
                } else {
                    status.innerText = "ন্যারো গুগল এআই দিয়ে খুঁজছে...";
                    document.getElementById('narrow').classList.add('thinking');
                    
                    try {
                        // উন্নত এআই সার্চ লজিক
                        const search = await fetch(`https://bn.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`);
                        const data = await search.json();
                        document.getElementById('narrow').classList.remove('thinking');
                        
                        if(data.extract) {
                            speak("গুগল এআই থেকে আমি এই তথ্যটি পেলাম: " + data.extract.substring(0, 300));
                        } else {
                            speak("দুঃখিত রনি ভাই, ইন্টারনেটেও এটার সঠিক উত্তর পেলাম না। আমাকে কি অন্য কিছু জিজ্ঞেস করবেন?");
                        }
                    } catch(err) {
                        speak("আমার নেটওয়ার্কে একটু সমস্যা হচ্ছে রনি ভাই!");
                    }
                }
            };
            recognition.start();
        }
    </script>
</body>
</html>
