<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leon - Smart Brain AI</title>
    <style>
        :root { --line: #000; }
        body { background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Arial', sans-serif; }
        .robot { position: relative; width: 300px; height: 450px; display: flex; flex-direction: column; align-items: center; }
        
        /* মাথা - সোজা থাকবে */
        .head { width: 180px; height: 170px; background: #fff; border: 4.5px solid var(--line); border-radius: 50px; position: relative; z-index: 10; transform: none !important; }
        
        .eyes { display: flex; justify-content: space-around; margin-top: 50px; padding: 0 15px; }
        .eye { width: 45px; height: 45px; background: var(--line); border-radius: 50%; position: relative; overflow: hidden; }
        .eye::after { content: ''; position: absolute; width: 100%; height: 100%; background: #fff; top: -100%; transition: 0.1s; }
        .blink::after { top: 0; }
        
        /* মুখ - কথা বলার সময় একটানা নড়বে */
        .mouth { width: 60px; height: 6px; background: var(--line); margin: 40px auto 0; border-radius: 10px; transition: 0.1s; }
        .talking { animation: talk 0.15s infinite alternate !important; }
        @keyframes talk { from { height: 6px; } to { height: 25px; border-radius: 40%; } }
        
        /* শরীর ও হাত */
        .body { width: 130px; height: 150px; background: #fff; border: 4.5px solid var(--line); border-radius: 40px 40px 15px 15px; margin-top: -10px; position: relative; }
        .arm { position: absolute; top: 15px; width: 22px; height: 110px; background: #fff; border: 3.5px solid var(--line); border-radius: 12px; transform-origin: top center; transition: 0.4s; }
        .left { left: -35px; transform: rotate(20deg); }
        .right { right: -35px; transform: rotate(-20deg); }
        
        /* আঙুল */
        .hand { position: absolute; bottom: -45px; width: 55px; height: 50px; left: -18px; display: flex; justify-content: center; align-items: flex-start; }
        .finger { width: 7px; height: 32px; background: var(--line); border-radius: 8px; margin: 0 1.5px; }
        
        .arm-move { animation: armWave 0.5s infinite alternate; }
        @keyframes armWave { from { transform: rotate(15deg); } to { transform: rotate(35deg); } }

        /* অ্যাকশন */
        .hands-up .left { transform: rotate(160deg); }
        .hands-up .right { transform: rotate(-160deg); }
        .shoot-mode .right { transform: rotate(-90deg); }
        .bullet { position: absolute; width: 15px; height: 8px; background: red; border-radius: 50%; right: -60px; top: 10px; display: none; animation: fly 0.4s linear infinite; }
        @keyframes fly { from { transform: translateX(0); } to { transform: translateX(100px); opacity: 0; } }

        #status { font-weight: bold; margin-top: 50px; color: #444; text-align: center; min-height: 25px; }
        .btn { background: #000; color: #fff; border: none; padding: 15px 40px; border-radius: 50px; cursor: pointer; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="robot" id="leon">
        <div class="head">
            <div class="eyes"><div class="eye" id="lE"></div><div class="eye" id="rE"></div></div>
            <div class="mouth" id="mth"></div>
        </div>
        <div class="body">
            <div class="arm left" id="lA">
                <div class="hand"><div class="finger"></div><div class="finger"></div><div class="finger"></div><div class="finger"></div><div class="finger"></div></div>
            </div>
            <div class="arm right" id="rA">
                <div class="bullet" id="bullet"></div>
                <div class="hand"><div class="finger"></div><div class="finger"></div><div class="finger"></div><div class="finger"></div><div class="finger"></div></div>
            </div>
        </div>
    </div>

    <div id="status">লিওন আপনার অপেক্ষায়...</div>
    <button class="btn" id="startBtn" onclick="activateLeon()">লিওনকে জাগান</button>

    <script>
        const status = document.getElementById('status'), mth = document.getElementById('mth'), leon = document.getElementById('leon');
        const lE = document.getElementById('lE'), rE = document.getElementById('rE'), rA = document.getElementById('rA'), lA = document.getElementById('lA');
        
        let speaking = false, recognition;

        const brain = {
            "নাম": "আমার নাম লিয়ন।",
            "কে তুমি": "আমার নাম লিয়ন।",
            "তৈরি করেছে": "আমাকে রনি ভাই তৈরি করেছে।",
            "বানিয়েছে": "আমাকে রনি ভাই তৈরি করেছে।",
            "বাড়ি": "আমার বাড়ি বাগেরহাটের চিতলমারী উপজেলায়।",
            "কোথায় থাকো": "আমার বাড়ি বাগেরহাটের চিতলমারী উপজেলায়।",
            "ঠিকানা": "আমার বাড়ি বাগেরহাটের চিতলমারী উপজেলায়।",
            "রনি কে": "রনি তো সে যে আমাকে তৈরি করেছে।",
            "রনি ভাই": "রনি তো সে যে আমাকে তৈরি করেছে।",
            "রনি কেমন": "রনি ভাইকেতো ভদ্রলোক বলে জানি, বাকিটা আল্লাহ জানে।",
            "কেমন আছো": "আলহামদুলিল্লাহ ভালো আছি, তুমি?",
            "কী অবস্থা": "এইতো আলহামদুলিল্লাহ, তোমার কী অবস্থা?",
            "কী খবর": "এইতো আলহামদুলিল্লাহ, তোমার কী অবস্থা?"
        };

        function activateLeon() {
            document.getElementById('startBtn').style.display = 'none';
            speak("আসসালামু আলাইকুম রনি ভাই! আমি লিওন।");
            setupRecognition();

            // অটো পলক ফেলা ও মুভমেন্ট
            setInterval(() => { 
                if(!speaking) { 
                    lE.classList.add('blink'); rE.classList.add('blink'); 
                    setTimeout(()=> { lE.classList.remove('blink'); rE.classList.remove('blink'); }, 200); 
                } 
            }, 4000);
        }

        function setupRecognition() {
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRec();
            recognition.lang = 'bn-BD';
            recognition.continuous = true; // সবসময় শুনবে
            recognition.interimResults = true; // দ্রুত শোনার জন্য

            recognition.onresult = (e) => {
                let transcript = "";
                for (let i = e.resultIndex; i < e.results.length; ++i) {
                    transcript += e.results[i][0].transcript;
                }
                transcript = transcript.trim().toLowerCase();

                // স্টপ কমান্ড - কথা বলার সময়ও কাজ করবে
                if (transcript.includes("স্টপ") || transcript.includes("থামো") || transcript.includes("stop")) {
                    window.speechSynthesis.cancel();
                    mth.classList.remove('talking');
                    speaking = false;
                    resetAnimations();
                    return;
                }

                // যখন কথা বলছে না, তখনই নতুন কমান্ড নিবে
                if (e.results[e.results.length - 1].isFinal && !speaking) {
                    status.innerText = "আপনি: " + transcript;
                    handle(transcript);
                }
            };
            
            recognition.onend = () => { recognition.start(); };
            recognition.start();
        }

        async function handle(q) {
            resetAnimations();

            // ১. ইন-বিল্ট ব্রেন চেক (সঠিক উত্তর)
            for(let key in brain) {
                if(q.includes(key)) return speak(brain[key]);
            }

            // অ্যাকশন কমান্ড
            if(q.includes("হ্যান্স আপ")) { leon.classList.add('hands-up'); return speak("ঠিক আছে, হাত জাগালাম!"); }
            if(q.includes("গুলি")) { leon.classList.add('shoot-mode'); document.getElementById('bullet').style.display='block'; return speak("ডিসকাও! ডিসকাও!"); }
            if(q.includes("গজল")) return speak("লা ইলাহা ইল্লাল্লাহ, মুহাম্মাদুর রাসুলুল্লাহ।");

            // ২. ইন্টারনেট সার্চ (অরিজিনাল কোড)
            status.innerText = "ইন্টারনেটে খুঁজছি...";
            speaking = true; // সার্চ চলাকালীন অন্য কথা শুনবে না

            try {
                const searchRes = await fetch(`https://bn.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(q)}&format=json&origin=*`);
                const searchData = await searchRes.json();
                
                if (searchData.query.search.length > 0) {
                    const title = searchData.query.search[0].title;
                    const summaryRes = await fetch(`https://bn.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`);
                    const summaryData = await summaryRes.json();
                    
                    if(summaryData.extract) speak(summaryData.extract.split('.')[0] + "।");
                    else speak("দুঃখিত রনি ভাই, ইন্টারনেটে বিস্তারিত পেলাম না।");
                } else {
                    speak("রনি ভাই, এই প্রশ্নের উত্তর আমার জানা নেই। অন্য কিছু জিজ্ঞেস করুন।");
                }
            } catch(e) { 
                speak("ইন্টারনেট কানেকশন দুর্বল রনি ভাই।"); 
            }
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            speaking = true;
            
            const s = new SpeechSynthesisUtterance(text);
            s.lang = 'bn-BD';
            
            s.onstart = () => { 
                mth.classList.add('talking'); // মুখ একটানা নড়বে
                lA.classList.add('arm-move'); rA.classList.add('arm-move'); 
            };
            
            s.onend = () => { 
                mth.classList.remove('talking'); 
                lA.classList.remove('arm-move'); rA.classList.remove('arm-move');
                speaking = false; 
                resetAnimations();
            };
            
            window.speechSynthesis.speak(s);
        }

        function resetAnimations() {
            leon.classList.remove('hands-up', 'shoot-mode');
            document.getElementById('bullet').style.display='none';
        }
    </script>
</body>
</html>
