<!DOCTYPE html>

<html lang="bn">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Leon - Smart Emotional AI Pet</title>

    <style>

        :root { --line: #1a1a1a; --bg: #f4f6f9; }

        body { background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }

        

        .robot { position: relative; width: 320px; height: 500px; display: flex; flex-direction: column; align-items: center; }

        

        /* বক্সি-রাউন্ড মাথা - একদম স্থির থাকবে */

        .head { 

            width: 210px; height: 185px; background: #fff; 

            border: 5px solid var(--line); 

            border-radius: 55px; 

            position: relative; z-index: 10; 

            display: flex; flex-direction: column; align-items: center; 

            box-shadow: 0 10px 25px rgba(0,0,0,0.1);

            transform: none !important; 

        }

        

        /* সুন্দর চোখ */

        .eyes { display: flex; justify-content: space-around; width: 100%; margin-top: 55px; padding: 0 30px; box-sizing: border-box; }

        .eye { width: 45px; height: 45px; background: var(--line); border-radius: 50%; position: relative; transition: 0.1s; }

        /* চোখের ভেতরের সাদা রিফ্লেকশন */

        .eye::after { content: ''; position: absolute; width: 12px; height: 12px; background: #fff; border-radius: 50%; top: 8px; right: 8px; }

        

        .blink { animation: fastBlink 0.15s; }

        @keyframes fastBlink { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.1); } }


        /* মুখের এনিমেশন - একটানা চলবে */

        .mouth { width: 45px; height: 6px; background: var(--line); margin-top: 35px; border-radius: 10px; transition: 0.1s; }

        .talking { animation: mouthMove 0.18s infinite alternate !important; }

        @keyframes mouthMove { 

            0% { height: 6px; width: 45px; border-radius: 10px; } 

            100% { height: 24px; width: 35px; border-radius: 40%; } 

        }

        

        .laughing { width: 55px; height: 28px; border-radius: 0 0 55px 55px; border: 4px solid var(--line); border-top: none; background: transparent; }

        .crying { width: 45px; height: 10px; border-radius: 20px 20px 0 0; border: 4px solid var(--line); border-bottom: none; }


        .body-container { width: 155px; height: 175px; background: #fff; border: 5px solid var(--line); border-radius: 45px 45px 25px 25px; margin-top: -15px; position: relative; box-shadow: 0 8px 15px rgba(0,0,0,0.05); }

        

        /* হাত ও ৫ আঙুল */

        .arm { position: absolute; top: 25px; width: 26px; height: 115px; background: #fff; border: 4px solid var(--line); border-radius: 15px; transform-origin: top center; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .left { left: -42px; transform: rotate(18deg); }

        .right { right: -42px; transform: rotate(-18deg); }

        

        .hand { position: absolute; bottom: -38px; width: 60px; height: 50px; left: -20px; display: flex; justify-content: center; }

        .finger { width: 6px; height: 30px; background: var(--line); border-radius: 10px; margin: 0 1.2px; }


        /* বিভিন্ন মুভমেন্ট ও অ্যাকশন */

        .hands-up .left { transform: rotate(160deg); }

        .hands-up .right { transform: rotate(-160deg); }

        .scratch-head .right { transform: rotate(-150deg) translateY(-30px); animation: scratch 0.3s infinite; }

        .touch-face .right { transform: rotate(-130deg) translateX(-20px) translateY(-35px); }

        .pocket .left { transform: rotate(35deg) translateY(10px); }

        .pocket .right { transform: rotate(-35deg) translateY(10px); }

        .thinking .right { transform: rotate(-140deg) translateY(-20px); }

        

        .shoot-mode .right { transform: rotate(-90deg); }

        .bullet { position: absolute; width: 15px; height: 6px; background: #e74c3c; border-radius: 50%; right: -60px; top: 12px; display: none; animation: fly 0.25s linear infinite; }

        

        @keyframes scratch { 0%, 100% { transform: rotate(-150deg); } 50% { transform: rotate(-160deg); } }

        @keyframes fly { from { transform: translateX(0); } to { transform: translateX(150px); opacity: 0; } }


        #status { font-weight: 600; margin-top: 40px; color: #444; height: 35px; text-align: center; font-size: 17px; }

        .btn { background: #1a1a1a; color: #fff; border: none; padding: 15px 45px; border-radius: 50px; cursor: pointer; margin-top: 20px; font-weight: bold; font-size: 18px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: 0.2s; }

        .btn:hover { transform: scale(1.05); }

    </style>

</head>

<body>


    <div class="robot" id="leonRobot">

        <div class="head">

            <div class="eyes"><div class="eye" id="lE"></div><div class="eye" id="rE"></div></div>

            <div class="mouth" id="mth"></div>

        </div>

        <div class="body-container">

            <div class="arm left" id="lA">

                <div class="hand"><div class="finger"></div><div class="finger"></div><div class="finger"></div><div class="finger"></div><div class="finger"></div></div>

            </div>

            <div class="arm right" id="rA">

                <div class="bullet" id="bullet"></div>

                <div class="hand"><div class="finger"></div><div class="finger"></div><div class="finger"></div><div class="finger"></div><div class="finger"></div></div>

            </div>

        </div>

    </div>


    <div id="status">লিওন আপনার অপেক্ষায়...</div>

    <button class="btn" id="startBtn" onclick="activateLeon()">লিওনকে জাগান</button>


    <script>

        const status = document.getElementById('status'), mth = document.getElementById('mth'), robot = document.getElementById('leonRobot');

        const lE = document.getElementById('lE'), rE = document.getElementById('rE'), lA = document.getElementById('lA'), rA = document.getElementById('rA');

        

        let speaking = false, recognition;

        

        // মজার ভাইরাল ডায়লগ

        const viralDialogues = ["মাথা নষ্ট মামা!", "ওরে বাবা, এটা কী শুনলাম!", "খেলা হবে!", "অস্থির ভাই অস্থির!", "একদম কোপাইয়া দিমু!", "সেই লেভেল ভাই!", "বিউটিফুল!"];


        // আপনার দেওয়া ৭টি প্রশ্ন ও উত্তর

        const brain = {

            "নাম": "আমার নাম লিয়ন।",

            "কে তুমি": "আমার নাম লিয়ন।",

            "তৈরি করেছে": "আমাকে রনি ভাই তৈরি করেছে।",

            "বানিয়েছে": "আমাকে রনি ভাই তৈরি করেছে।",

            "বাড়ি": "আমার বাড়ি বাগেরহাটের চিতলমারী উপজেলায়।",

            "থাকো": "আমার বাড়ি বাগেরহাটের চিতলমারী উপজেলায়।",

            "ঠিকানা": "আমার বাড়ি বাগেরহাটের চিতলমারী উপজেলায়।",

            "রনি কে": "রনি তো সে যে আমাকে তৈরি করেছে।",

            "রনি ভাই": "রনি তো সে যে আমাকে তৈরি করেছে।",

            "রনি কেমন": "রনি ভাইকেতো ভদ্রলোক বলে জানি, বাকিটা আল্লাহ জানে।",

            "কেমন আছো": "আলহামদুলিল্লাহ ভালো আছি, তুমি?",

            "কী অবস্থা": "এইতো আলহামদুলিল্লাহ, তোমার কী অবস্থা?",

            "কী খবর": "এইতো আলহামদুলিল্লাহ, তোমার কী অবস্থা?",

            "ধন্যবাদ": "তোমাকেও অনেক ধন্যবাদ!",

            "প্রশংসা": "ধন্যবাদ! প্রশংসা শুনতে কার না ভালো লাগে বলো?",

            "সুন্দর": "ধন্যবাদ! প্রশংসা শুনতে কার না ভালো লাগে বলো?"

        };


        function activateLeon() {

            document.getElementById('startBtn').style.display = 'none';

            speak("আসসালামু আলাইকুম! আমি লিওন। রনি ভাই আমাকে খুব যত্ন করে তৈরি করেছে।");

            setupRecognition();

            startIdleLoop();

        }


        function setupRecognition() {

            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;

            recognition = new SpeechRec();

            recognition.lang = 'bn-BD';

            recognition.continuous = true;

            recognition.interimResults = true; // দ্রুত শোনার জন্য


            recognition.onresult = (e) => {

                let interimTranscript = "";

                let finalTranscript = "";


                for (let i = e.resultIndex; i < e.results.length; ++i) {

                    if (e.results[i].isFinal) {

                        finalTranscript += e.results[i][0].transcript;

                    } else {

                        interimTranscript += e.results[i][0].transcript;

                    }

                }


                let fullTranscript = (finalTranscript + interimTranscript).trim().toLowerCase();


                // স্টপ কমান্ড - সাথে সাথে কাজ করবে

                if (fullTranscript.includes("স্টপ") || fullTranscript.includes("থামো") || fullTranscript.includes("stop")) {

                    window.speechSynthesis.cancel();

                    speaking = false;

                    mth.classList.remove('talking');

                    resetAnimations();

                    return;

                }


                // যখন ফাইনাল কথা বলা শেষ হবে এবং লিওন কথা বলছে না

                if (finalTranscript !== "" && !speaking) {

                    let q = finalTranscript.trim();

                    if(q.length > 1) { // নয়েজ ফিল্টার করার জন্য

                        status.innerText = "আপনি: " + q;

                        handleCommand(q);

                    }

                }

            };

            

            // মাইক্রোফোন অফ হয়ে গেলে আবার চালু করবে

            recognition.onend = () => { try { recognition.start(); } catch(e){} };

            recognition.start();

        }


        async function handleCommand(q) {

            resetAnimations();

            let lowerQ = q.toLowerCase();


            // ১. ব্রেন থেকে সঠিক উত্তর চেক

            for (let key in brain) {

                if (lowerQ.includes(key)) {

                    robot.classList.add('thinking'); // ভাবার ভান

                    setTimeout(() => speak(brain[key]), 800);

                    return;

                }

            }


            // ২. অ্যাকশন ও মুভমেন্ট কমান্ড

            if(lowerQ.includes("লিয়ন") || lowerQ.includes("লিওন")) return speak("জী, আমি শুনছি।");

            if(lowerQ.includes("হ্যান্স আপ")) { robot.classList.add('hands-up'); return speak("ঠিক আছে, হাত জাগালাম!"); }

            if(lowerQ.includes("হাসো")) { mth.className = 'mouth laughing'; return speak("হা হা হা! অনেক মজা পেলাম।"); }

            if(lowerQ.includes("কাঁদো")) { mth.className = 'mouth crying'; return speak("উ হু হু, আমি কাঁদছি। আমার খুব মন খারাপ।"); }

            if(lowerQ.includes("গুলি")) { robot.classList.add('shoot-mode'); document.getElementById('bullet').style.display='block'; return speak("ডিসকাও! ডিসকাও! এই নিন গুলি!"); }

            if(lowerQ.includes("গজল")) return speak("বিনা বাজনায় গজল গাইছি... লা ইলাহা ইল্লাল্লাহ, মুহাম্মাদুর রাসুলুল্লাহ। সুবহানাল্লাহ, আলহামদুলিল্লাহ।");


            // ৩. ইন্টারনেট সার্চ (নিখুঁতভাবে)

            status.innerText = "একটু দাঁড়ান, খুঁজছি...";

            try {

                const searchRes = await fetch(`https://bn.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(q)}&format=json&origin=*`);

                const searchData = await searchRes.json();

                

                if (searchData.query && searchData.query.search.length > 0) {

                    const title = searchData.query.search[0].title;

                    const summaryRes = await fetch(`https://bn.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`);

                    const summaryData = await summaryRes.json();

                    

                    if (summaryData.extract) {

                        speak(summaryData.extract.split('।')[0] + "।");

                    } else {

                        speak("দুঃখিত রনি ভাই, ইন্টারনেটে বিস্তারিত পেলাম না।");

                    }

                } else {

                    speak("এই প্রশ্নের উত্তর আমার জানা নেই। আমাকে অন্য কিছু জিজ্ঞেস করুন।");

                }

            } catch(e) { 

                // শুধুমাত্র নেটওয়ার্ক ফল্ট হলেই এটা বলবে, অযথা বলবে না

                speak("আপনার ইন্টারনেট কানেকশনে সমস্যা হচ্ছে মনে হয়।"); 

            }

        }


        function speak(text) {

            window.speechSynthesis.cancel();

            speaking = true;

            

            const s = new SpeechSynthesisUtterance(text);

            s.lang = 'bn-BD';

            s.pitch = 1.2; // আবেগপ্রবণ ভয়েস

            s.rate = 0.9;

            

            s.onstart = () => { 

                mth.classList.add('talking'); 

                // কথা বলার সময় হাত নেড়ে কথা বলবে

                lA.style.animation = "talkWave 0.5s infinite alternate";

                rA.style.animation = "talkWave 0.5s infinite alternate reverse";

            };

            

            s.onend = () => { 

                mth.classList.remove('talking'); 

                lA.style.animation = ""; rA.style.animation = "";

                speaking = false; 

                resetAnimations();

            };

            

            window.speechSynthesis.speak(s);

        }


        // কথা না বললে বিভিন্ন এক্টিভিটি করবে

        function startIdleLoop() {

            setInterval(() => {

                if(!speaking) {

                    const rand = Math.random();

                    resetAnimations();

                    

                    if(rand < 0.2) { 

                        robot.classList.add('scratch-head'); 

                        speak(viralDialogues[Math.floor(Math.random() * viralDialogues.length)]); 

                    }

                    else if(rand < 0.4) { robot.classList.add('shoot-mode'); document.getElementById('bullet').style.display='block'; }

                    else if(rand < 0.5) { robot.classList.add('touch-face'); }

                    else if(rand < 0.6) { robot.classList.add('pocket'); }

                    else if(rand < 0.8) { lE.classList.add('blink'); rE.classList.add('blink'); }

                    

                    setTimeout(() => { if(!speaking) resetAnimations(); }, 2500);

                }

            }, 6000); // প্রতি ৬ সেকেন্ড পর পর চেক করবে

        }


        function resetAnimations() {

            robot.classList.remove('hands-up', 'scratch-head', 'shoot-mode', 'touch-face', 'pocket', 'thinking');

            if(!speaking) mth.className = 'mouth';

            lE.classList.remove('blink'); rE.classList.remove('blink');

            document.getElementById('bullet').style.display='none';

        }

    </script>

    <style> @keyframes talkWave { from { transform: rotate(10deg); } to { transform: rotate(35deg); } } </style>

</body>

</html>
