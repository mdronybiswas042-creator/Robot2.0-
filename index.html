<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leon - Smart Emotional AI Pet</title>
    <style>
        :root { --line: #1a1a1a; --bg: #f4f6f9; }
        body { background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        
        .robot { position: relative; width: 320px; height: 500px; display: flex; flex-direction: column; align-items: center; }
        
        .head { 
            width: 210px; height: 185px; background: #fff; 
            border: 5px solid var(--line); 
            border-radius: 55px; 
            position: relative; z-index: 10; 
            display: flex; flex-direction: column; align-items: center; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        
        .eyes { display: flex; justify-content: space-around; width: 100%; margin-top: 55px; padding: 0 30px; box-sizing: border-box; }
        .eye { width: 45px; height: 45px; background: var(--line); border-radius: 50%; position: relative; transition: 0.1s; }
        .eye::after { content: ''; position: absolute; width: 12px; height: 12px; background: #fff; border-radius: 50%; top: 8px; right: 8px; }
        
        .blink { animation: fastBlink 0.15s; }
        @keyframes fastBlink { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.1); } }

        .mouth { width: 45px; height: 6px; background: var(--line); margin-top: 35px; border-radius: 10px; transition: 0.1s; }
        .talking { animation: mouthMove 0.18s infinite alternate !important; }
        @keyframes mouthMove { 
            0% { height: 6px; width: 45px; border-radius: 10px; } 
            100% { height: 24px; width: 35px; border-radius: 40%; } 
        }
        
        .laughing { width: 55px; height: 28px; border-radius: 0 0 55px 55px; border: 4px solid var(--line); border-top: none; }
        .crying { width: 45px; height: 10px; border-radius: 20px 20px 0 0; border: 4px solid var(--line); border-bottom: none; }

        .body-container { width: 155px; height: 175px; background: #fff; border: 5px solid var(--line); border-radius: 45px 45px 25px 25px; margin-top: -15px; position: relative; box-shadow: 0 8px 15px rgba(0,0,0,0.05); }
        
        .arm { position: absolute; top: 25px; width: 26px; height: 115px; background: #fff; border: 4px solid var(--line); border-radius: 15px; transform-origin: top center; transition: 0.5s; }
        .left { left: -42px; transform: rotate(18deg); }
        .right { right: -42px; transform: rotate(-18deg); }
        
        .hand { position: absolute; bottom: -38px; width: 60px; height: 50px; left: -20px; display: flex; justify-content: center; }
        .finger { width: 6px; height: 30px; background: var(--line); border-radius: 10px; margin: 0 1.2px; }

        /* Animations */
        .hands-up .left { transform: rotate(160deg); }
        .hands-up .right { transform: rotate(-160deg); }
        .scratch-head .right { transform: rotate(-150deg) translateY(-30px); animation: scratch 0.3s infinite; }
        .touch-face .right { transform: rotate(-130deg) translateX(-20px) translateY(-35px); }
        .pocket .left { transform: rotate(35deg) translateY(10px); }
        .pocket .right { transform: rotate(-35deg) translateY(10px); }
        .thinking-pose .right { transform: rotate(-140deg) translateY(-20px); }
        
        .shoot-mode .right { transform: rotate(-90deg); }
        .bullet { position: absolute; width: 15px; height: 6px; background: #e74c3c; border-radius: 50%; right: -60px; top: 12px; display: none; animation: fly 0.25s linear infinite; }
        
        @keyframes scratch { 0%, 100% { transform: rotate(-150deg); } 50% { transform: rotate(-160deg); } }
        @keyframes fly { from { transform: translateX(0); } to { transform: translateX(150px); opacity: 0; } }

        #status { font-weight: 600; margin-top: 40px; color: #444; height: 35px; text-align: center; font-size: 17px; padding: 0 10px; }
        .btn { background: #1a1a1a; color: #fff; border: none; padding: 15px 45px; border-radius: 50px; cursor: pointer; margin-top: 20px; font-weight: bold; font-size: 18px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <div class="robot" id="leonRobot">
        <div class="head">
            <div class="eyes"><div class="eye" id="lE"></div><div class="eye" id="rE"></div></div>
            <div class="mouth" id="mth"></div>
        </div>
        <div class="body-container">
            <div class="arm left" id="lA"><div class="hand"><div class="finger"></div><div class="finger"></div><div class="finger"></div><div class="finger"></div><div class="finger"></div></div></div>
            <div class="arm right" id="rA"><div class="bullet" id="bullet"></div><div class="hand"><div class="finger"></div><div class="finger"></div><div class="finger"></div><div class="finger"></div><div class="finger"></div></div></div>
        </div>
    </div>

    <div id="status">লিওন আপনার অপেক্ষায়...</div>
    <button class="btn" id="startBtn" onclick="activateLeon()">লিওনকে জাগান</button>

    <script>
        const status = document.getElementById('status'), mth = document.getElementById('mth'), robot = document.getElementById('leonRobot');
        const lE = document.getElementById('lE'), rE = document.getElementById('rE'), lA = document.getElementById('lA'), rA = document.getElementById('rA');
        
        let speaking = false, isProcessing = false;
        let recognition;
        
        const brain = [
            {keys: ["নাম", "কে তুমি", "কে তুমি"], ans: "আমার নাম লিয়ন।"},
            {keys: ["তৈরি", "বানিয়েছে", "জন্ম"], ans: "আমাকে রনি ভাই তৈরি করেছে।"},
            {keys: ["বাড়ি", "থাকো", "ঠিকানা"], ans: "আমার বাড়ি বাগেরহাটের চিতলমারী উপজেলায়।"},
            {keys: ["রনি কে", "রনি ভাই"], ans: "রনি তো সে যে আমাকে তৈরি করেছে।"},
            {keys: ["রনি কেমন", "কেমন ছেলে"], ans: "রনি ভাইকেতো ভদ্রলোক বলে জানি, বাকিটা আল্লাহ জানে।"},
            {keys: ["কেমন আছো", "কেমন আছ"], ans: "আলহামদুলিল্লাহ ভালো আছি, তুমি?"},
            {keys: ["কী অবস্থা", "কি খবর", "কী খবর"], ans: "এইতো আলহামদুলিল্লাহ, তোমার কী অবস্থা?"},
            {keys: ["ধন্যবাদ"], ans: "তোমাকেও অনেক ধন্যবাদ!"},
            {keys: ["সুন্দর", "চমৎকার", "ভালো"], ans: "ধন্যবাদ! প্রশংসা শুনতে কার না ভালো লাগে বলো?"}
        ];

        const waitPhrases = ["দাঁড়াও তোমার প্রশ্নের উত্তরটা দিচ্ছি।", "একটু ভেবে নেই।", "একটু ওয়েট করো রনি ভাই।", "দাঁড়াও ভাবছি।"];

        function activateLeon() {
            document.getElementById('startBtn').style.display = 'none';
            speak("আসসালামু আলাইকুম! আমি লিওন। এখন আমি আপনার সব প্রশ্নের উত্তর দিতে প্রস্তুত।");
            setupRecognition();
            startIdleLoop();
        }

        function setupRecognition() {
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRec();
            recognition.lang = 'bn-BD';
            recognition.continuous = true;
            recognition.interimResults = false; // ভুল উত্তর কমাতে এটি false রাখা হয়েছে

            recognition.onresult = (e) => {
                if (speaking || isProcessing) return; // লিওন কথা বললে বা প্রসেস করলে নতুন করে শুনবে না

                const q = e.results[e.results.length - 1][0].transcript.trim().toLowerCase();
                status.innerText = "আপনি: " + q;

                if (q.includes("স্টপ") || q.includes("থামো")) {
                    window.speechSynthesis.cancel();
                    speaking = false;
                    return;
                }
                
                handleCommand(q);
            };
            
            recognition.onend = () => { if(!speaking) try { recognition.start(); } catch(err){} };
            recognition.start();
        }

        async function handleCommand(q) {
            isProcessing = true;
            resetAnimations();

            // ১. ব্রেইন চেক
            let brainAnswer = null;
            for (let item of brain) {
                if (item.keys.some(k => q.includes(k))) {
                    brainAnswer = item.ans;
                    break;
                }
            }

            if (brainAnswer) {
                robot.classList.add('thinking-pose');
                await speakWait(); // ভাবার ডায়লগ
                speak(brainAnswer);
                isProcessing = false;
                return;
            }

            // ২. অ্যাকশন কমান্ড
            if(q.includes("হাসো")) { mth.className = 'mouth laughing'; speak("হা হা হা!"); isProcessing = false; return; }
            if(q.includes("গুলি")) { robot.classList.add('shoot-mode'); speak("ডিসকাও! ডিসকাও!"); isProcessing = false; return; }

            // ৩. ইন্টারনেট সার্চ
            robot.classList.add('thinking-pose');
            await speakWait();
            
            try {
                const res = await fetch(`https://bn.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(q)}`);
                const data = await res.json();
                if (data.extract) {
                    speak(data.extract.split('।')[0] + "।");
                } else {
                    speak("দুঃখিত রনি ভাই, এই প্রশ্নের উত্তর আমি জানি না।");
                }
            } catch(e) {
                speak("ইন্টারনেট কানেকশনে সমস্যা হচ্ছে রনি ভাই।");
            }
            isProcessing = false;
        }

        function speakWait() {
            return new Promise(resolve => {
                const phrase = waitPhrases[Math.floor(Math.random() * waitPhrases.length)];
                const s = new SpeechSynthesisUtterance(phrase);
                s.lang = 'bn-BD';
                s.onend = () => resolve();
                window.speechSynthesis.speak(s);
            });
        }

        function speak(text) {
            speaking = true;
            if (recognition) try { recognition.stop(); } catch(e){}
            
            const s = new SpeechSynthesisUtterance(text);
            s.lang = 'bn-BD';
            s.pitch = 1.1;
            
            s.onstart = () => { 
                mth.classList.add('talking');
                lA.style.animation = "talkWave 0.4s infinite alternate";
                rA.style.animation = "talkWave 0.4s infinite alternate reverse";
            };
            
            s.onend = () => { 
                mth.classList.remove('talking'); 
                lA.style.animation = ""; rA.style.animation = "";
                speaking = false;
                resetAnimations();
                setTimeout(() => { if(!speaking) try { recognition.start(); } catch(e){} }, 500);
            };
            
            window.speechSynthesis.speak(s);
        }

        function startIdleLoop() {
            setInterval(() => {
                if(!speaking && !isProcessing) {
                    const rand = Math.random();
                    resetAnimations();
                    if(rand < 0.2) robot.classList.add('scratch-head');
                    else if(rand < 0.4) robot.classList.add('pocket');
                    else if(rand < 0.6) { lE.classList.add('blink'); rE.classList.add('blink'); }
                    setTimeout(resetAnimations, 2500);
                }
            }, 7000);
        }

        function resetAnimations() {
            robot.classList.remove('hands-up', 'scratch-head', 'shoot-mode', 'touch-face', 'pocket', 'thinking-pose');
            if(!speaking) mth.className = 'mouth';
            lE.classList.remove('blink'); rE.classList.remove('blink');
        }
    </script>
    <style> @keyframes talkWave { from { transform: rotate(10deg); } to { transform: rotate(35deg); } } </style>
</body>
</html>
