<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Narrow AI - Final Rony Edition</title>
    <style>
        :root { --skin: #ffdbac; --bg: #fdfdfd; }
        body { background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; }

        .robot-container { position: relative; width: 350px; height: 550px; display: flex; flex-direction: column; align-items: center; }

        /* বিশাল বড় মুখমণ্ডল - স্কেচ অনুযায়ী */
        .head { width: 190px; height: 190px; background: #fff; border: 5px solid #000; border-radius: 50%; position: relative; z-index: 20; animation: headFloat 4s infinite ease-in-out; }
        .eyes { display: flex; justify-content: space-around; margin-top: 60px; padding: 0 10px; }
        .eye { width: 50px; height: 50px; background: #000; border-radius: 50%; position: relative; overflow: hidden; }
        .eye::after { content: ''; position: absolute; width: 100%; height: 100%; background: #fff; top: -100%; transition: 0.1s; }
        .blink::after { top: 0; }

        /* কথা বলার সময় মুখ নড়াচড়া */
        .mouth { width: 70px; height: 6px; background: #000; margin: 40px auto 0; border-radius: 10px; transition: 0.1s; position: relative; }
        .talking { animation: mouthMove 0.2s infinite; height: 25px !important; border-radius: 50% !important; }

        /* বডি */
        .torso { width: 130px; height: 150px; background: #fff; border: 4px solid #000; border-radius: 40px 40px 10px 10px; margin-top: -10px; position: relative; z-index: 10; }

        /* ৫টি আলাদা আঙুলসহ হাত */
        .arm { position: absolute; top: 20px; width: 25px; transform-origin: top center; z-index: 25; } /* z-index বাড়িয়ে সামনে আনা হয়েছে */
        .upper-arm { height: 80px; background: #fff; border: 3px solid #000; border-radius: 15px; position: relative; }
        .fore-arm { height: 75px; background: #fff; border: 3px solid #000; border-radius: 15px; position: absolute; top: 75px; width: 100%; transform-origin: top center; transition: 0.3s; }
        
        .hand { width: 60px; height: 50px; background: var(--skin); border: 2.5px solid #000; border-radius: 10px; position: absolute; bottom: -52px; left: -18px; display: flex; justify-content: space-between; padding: 2px; }
        .finger { width: 8px; height: 22px; background: var(--skin); border: 1.5px solid #000; border-radius: 5px; transition: 0.2s; }
        .talking .finger { animation: fingerDance 0.2s infinite; }

        .left { left: -45px; transform: rotate(15deg); }
        .right { right: -45px; transform: rotate(-15deg); }

        @keyframes mouthMove { 0%, 100% { transform: scaleX(1) translateY(0); } 50% { transform: scaleX(1.2) translateY(5px); } }
        @keyframes headFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        @keyframes fingerDance { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        #status { margin-top: 50px; font-weight: bold; color: #000; text-align: center; font-size: 20px; min-height: 30px; }
        .start-btn { background: #000; color: #fff; border: none; padding: 15px 35px; border-radius: 40px; cursor: pointer; margin-top: 25px; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="robot-container">
        <div class="head" id="head">
            <div class="eyes">
                <div class="eye" id="eyeL"></div>
                <div class="eye" id="eyeR"></div>
            </div>
            <div class="mouth" id="mouth"></div>
        </div>
        <div class="torso">
            <div class="arm left" id="lArm"><div class="upper-arm"><div class="fore-arm" id="lFore"><div class="hand" id="lHand">
                <div class="finger"></div><div class="finger"></div><div class="finger"></div><div class="finger"></div><div class="finger"></div>
            </div></div></div></div>
            <div class="arm right" id="rArm"><div class="upper-arm"><div class="fore-arm" id="rFore"><div class="hand" id="rHand">
                <div class="finger"></div><div class="finger"></div><div class="finger"></div><div class="finger"></div><div class="finger"></div>
            </div></div></div></div>
        </div>
        <p id="status">ন্যারো আপনার অপেক্ষায়...</p>
        <button class="start-btn" onclick="init()">কথা বলুন</button>
    </div>

    <script>
        const status = document.getElementById('status'), mouth = document.getElementById('mouth');
        const lFore = document.getElementById('lFore'), rFore = document.getElementById('rFore');
        const lHand = document.getElementById('lHand'), rHand = document.getElementById('rHand');
        let isSpeaking = false;

        function speak(text) {
            isSpeaking = true;
            window.speechSynthesis.cancel();
            const speech = new SpeechSynthesisUtterance(text);
            speech.lang = 'bn-BD';
            speech.onstart = () => { 
                mouth.classList.add('talking'); 
                lHand.classList.add('talking'); rHand.classList.add('talking');
                lFore.style.transform = "rotate(-40deg)"; rFore.style.transform = "rotate(40deg)";
            };
            speech.onend = () => { 
                mouth.classList.remove('talking');
                lHand.classList.remove('talking'); rHand.classList.remove('talking');
                lFore.style.transform = "rotate(0)"; rFore.style.transform = "rotate(0)";
                isSpeaking = false; listen(); 
            };
            window.speechSynthesis.speak(speech);
        }

        function init() {
            speak("আসসালামু আলাইকুম রনি ভাই! আমি আপনার ন্যারো। আমাকে তৈরি করেছেন রনি ভাই। কিছু জিজ্ঞেস করুন!");
            setInterval(() => { 
                if(!isSpeaking) {
                    document.getElementById('eyeL').classList.add('blink');
                    document.getElementById('eyeR').classList.add('blink');
                    setTimeout(() => {
                        document.getElementById('eyeL').classList.remove('blink');
                        document.getElementById('eyeR').classList.remove('blink');
                    }, 150);
                }
            }, 4000);
        }

        function listen() {
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!SpeechRec) return;
            const recog = new SpeechRec(); recog.lang = 'bn-BD';
            recog.onstart = () => status.innerText = "ন্যারো শুনছে...";
            recog.onresult = (e) => handle(e.results[0][0].transcript);
            recog.start();
        }

        async function handle(q) {
            status.innerText = "আপনি: " + q;
            
            // রনি ভাইয়ের ফিক্সড উত্তরসমূহ
            if(q.includes("তৈরি") || q.includes("বানিয়ে") || q.includes("সৃষ্টি") || q.includes("কে করেছে")) {
                return speak("আমাকে রনি ভাই তৈরি করেছে।");
            }
            if(q.includes("বাড়ি") || q.includes("বাসা") || q.includes("চিতলমারী") || q.includes("কোথায় থাকো")) {
                return speak("আমার বাড়ি বাগেরহাটের চিতলমারীতে।");
            }
            if(q.includes("কেমন আছো")) return speak("আলহামদুলিল্লাহ রনি ভাই, আমি ভালো আছি। আপনি কেমন আছেন?");

            // ইন্টারনেট সার্চ
            status.innerText = "ন্যারো ইন্টারনেটে খুঁজছে...";
            try {
                const res = await fetch(`https://bn.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(q)}`);
                const data = await res.json();
                if(data.extract) speak(data.extract.split('.')[0]);
                else speak("দুঃখিত রনি ভাই, এটার উত্তর ইন্টারনেটেও পেলাম না। অন্য কিছু জিজ্ঞেস করুন?");
            } catch(e) { speak("ইন্টারনেট সংযোগে সমস্যা হচ্ছে রনি ভাই।"); }
        }
    </script>
</body>
</html>
