<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leon - Auto AI Robot</title>
    <style>
        :root { --line: #000000; }
        body { background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; }

        .robot { position: relative; width: 300px; height: 450px; display: flex; flex-direction: column; align-items: center; transition: 0.3s; }

        /* আপনার স্কেচ অনুযায়ী মাথা */
        .head { width: 190px; height: 180px; background: #fff; border: 4px solid var(--line); border-radius: 50%; position: relative; z-index: 10; }
        .eyes { display: flex; justify-content: space-around; margin-top: 55px; padding: 0 15px; }
        .eye { width: 50px; height: 50px; background: var(--line); border-radius: 50%; position: relative; overflow: hidden; }
        .eye::after { content: ''; position: absolute; width: 100%; height: 100%; background: #fff; top: -100%; transition: 0.1s; }
        .blink::after { top: 0; }

        .mouth { width: 70px; height: 6px; background: var(--line); margin: 35px auto 0; border-radius: 10px; transition: 0.2s; }
        .talking { animation: talk 0.2s infinite alternate; }
        @keyframes talk { from { height: 6px; } to { height: 25px; border-radius: 50%; } }

        /* বডি - কনুই ছাড়া সরাসরি হাত */
        .body { width: 140px; height: 150px; background: #fff; border: 4px solid var(--line); border-radius: 40px 40px 10px 10px; margin-top: -10px; position: relative; }
        .pocket { width: 30px; height: 35px; border: 2.5px solid var(--line); position: absolute; bottom: 20px; right: 15px; border-radius: 5px; }

        /* হাত সরাসরি নিচের দিকে */
        .arm { position: absolute; top: 20px; width: 25px; height: 120px; background: #fff; border: 3.5px solid var(--line); border-radius: 15px; transform-origin: top center; transition: 0.5s; display: flex; align-items: flex-end; justify-content: center; }
        .left { left: -40px; transform: rotate(15deg); }
        .right { right: -40px; transform: rotate(-15deg); }

        /* কালো আঙুল - নিচের দিকে মুখ করা */
        .hand { position: absolute; bottom: -45px; width: 60px; height: 50px; display: flex; justify-content: center; align-items: flex-start; }
        .finger { width: 7px; height: 35px; background: var(--line); border-radius: 10px; margin: 0 2px; transition: 0.2s; }
        .arm-move { animation: handShake 0.5s infinite alternate; }
        @keyframes handShake { from { transform: rotate(-15deg) translateY(0); } to { transform: rotate(-25deg) translateY(-10px); } }

        /* গান অ্যাকশন */
        .gun-pose { transform: rotate(-90deg) !important; left: 50px !important; }

        #status { font-weight: bold; font-size: 18px; margin-top: 50px; color: #333; height: 25px; text-align: center; }
        .btn { background: #000; color: #fff; border: none; padding: 15px 40px; border-radius: 50px; cursor: pointer; margin-top: 20px; font-size: 18px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <div class="robot" id="robot">
        <div class="head" id="head">
            <div class="eyes"><div class="eye" id="lE"></div><div class="eye" id="rE"></div></div>
            <div class="mouth" id="mth"></div>
        </div>
        <div class="body">
            <div class="pocket"></div>
            <div class="arm left" id="lA"><div class="hand">
                <div class="finger"></div><div class="finger"></div><div class="finger"></div><div class="finger"></div><div class="finger"></div>
            </div></div>
            <div class="arm right" id="rA"><div class="hand">
                <div class="finger"></div><div class="finger"></div><div class="finger"></div><div class="finger"></div><div class="finger"></div>
            </div></div>
        </div>
        <p id="status">লিওন আপনার অপেক্ষায়...</p>
        <button class="btn" id="startBtn" onclick="initLeon()">লিওনকে জাগান</button>
    </div>

    <script>
        const status = document.getElementById('status'), mth = document.getElementById('mth'), robot = document.getElementById('robot');
        const lE = document.getElementById('lE'), rE = document.getElementById('rE'), rA = document.getElementById('rA'), lA = document.getElementById('lA');
        let speaking = false;

        const fixedQA = {
            "নাম": "আমার নাম লিয়ন।",
            "তৈরি": "আমাকে রনি ভাই তৈরি করেছে।",
            "বাড়ি": "আমার বাড়ি বাগেরহাটের চিতলমারীতে।"
        };

        function speak(text) {
            speaking = true;
            window.speechSynthesis.cancel();
            const s = new SpeechSynthesisUtterance(text);
            s.lang = 'bn-BD'; s.rate = 0.9;
            s.onstart = () => { 
                mth.classList.add('talking'); 
                lA.classList.add('arm-move'); rA.classList.add('arm-move');
            };
            s.onend = () => { 
                mth.classList.remove('talking'); 
                lA.classList.remove('arm-move'); rA.classList.remove('arm-move');
                speaking = false; resetAction(); listen(); 
            };
            window.speechSynthesis.speak(s);
        }

        function actGun() {
            rA.classList.add('gun-pose');
            setTimeout(() => rA.classList.remove('gun-pose'), 3000);
        }

        function resetAction() { robot.classList.remove('dance'); }

        function initLeon() {
            document.getElementById('startBtn').style.display = 'none';
            speak("আসসালামু আলাইকুম রনি ভাই! আমি এখন আপনার নাম ধরে ডাকলে অটোমেটিক শুনবো।");
            setInterval(() => { if(!speaking) { lE.classList.add('blink'); rE.classList.add('blink'); setTimeout(()=> { lE.classList.remove('blink'); rE.classList.remove('blink'); }, 200); } }, 4000);
        }

        function listen() {
            const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!Rec) return;
            const r = new Rec(); r.lang = 'bn-BD'; r.continuous = false;
            r.onstart = () => status.innerText = "লিওন আপনার কথা শুনছে...";
            r.onresult = (e) => handle(e.results[0][0].transcript);
            r.onerror = () => { if(!speaking) listen(); }; // এরর হলে আবার লিসেনিং মোডে যাবে
            r.start();
        }

        async function handle(q) {
            status.innerText = "আপনি: " + q;
            
            // গান অ্যাকশন চেক
            if(q.includes("গুলি") || q.includes("মারো")) {
                actGun();
                return speak("এই নিন রনি ভাই, ঠাস ঠাস! ভয় পেলেন?");
            }

            for(let key in fixedQA) { if(q.includes(key)) return speak(fixedQA[key]); }

            // ইন্টারনেট সার্চ লজিক
            status.innerText = "লিওন ইন্টারনেটে তথ্য খুঁজছে...";
            speak("সুন্দর প্রশ্ন রনি ভাই, দাঁড়ান উত্তরটা খুঁজে দিচ্ছি...");
            
            try {
                const res = await fetch(`https://bn.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(q)}`);
                const data = await res.json();
                setTimeout(() => {
                    if(data.extract) speak(data.extract.split('.')[0] + "।");
                    else speak("দুঃখিত রনি ভাই, এটার উত্তর আমি খুঁজে পেলাম না। অন্য কিছু জিজ্ঞেস করুন?");
                }, 1000);
            } catch(e) { speak("ইন্টারনেট কানেকশনে সমস্যা হচ্ছে রনি ভাই।"); }
        }
    </script>
</body>
</html>
