<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leon - Smart Emotional AI</title>
    <style>
        :root { --line: #1a1a1a; --bg: #ffffff; }
        body { background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Arial', sans-serif; overflow: hidden; }
        
        .robot { position: relative; width: 320px; height: 500px; display: flex; flex-direction: column; align-items: center; transition: 0.4s; }
        
        /* বক্সি-রাউন্ড মাথা */
        .head { 
            width: 200px; height: 180px; background: #fff; 
            border: 5px solid var(--line); 
            border-radius: 50px; 
            position: relative; z-index: 10; 
            display: flex; flex-direction: column; align-items: center; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        
        .eyes { display: flex; justify-content: space-around; width: 100%; margin-top: 50px; padding: 0 28px; box-sizing: border-box; }
        .eye { width: 44px; height: 44px; background: var(--line); border-radius: 50%; position: relative; }
        .eye::after { content: ''; position: absolute; width: 10px; height: 10px; background: #fff; border-radius: 50%; top: 7px; right: 7px; }
        
        /* পলক ফেলা (Fast Blink) */
        .blink { animation: fastBlink 0.15s ease-in-out; }
        @keyframes fastBlink { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.1); } }

        /* মুখের মুভমেন্ট */
        .mouth { width: 45px; height: 6px; background: var(--line); margin-top: 35px; border-radius: 10px; transition: 0.2s; }
        .talking { animation: speakAnim 0.12s infinite alternate; }
        @keyframes speakAnim { 0% { height: 5px; width: 42px; } 100% { height: 22px; width: 35px; border-radius: 50%; } }
        
        .laughing { width: 50px; height: 25px; border-radius: 0 0 50px 50px; border: 4px solid var(--line); border-top: none; }
        .crying { width: 40px; height: 8px; border-radius: 20px 20px 0 0; border: 4px solid var(--line); border-bottom: none; }

        .body-container { position: relative; width: 150px; height: 175px; background: #fff; border: 5px solid var(--line); border-radius: 40px 40px 25px 25px; margin-top: -12px; }
        
        /* ৫ আঙুলের হাত */
        .arm { position: absolute; top: 25px; width: 25px; height: 110px; background: #fff; border: 4px solid var(--line); border-radius: 15px; transform-origin: top center; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .left { left: -42px; transform: rotate(18deg); }
        .right { right: -42px; transform: rotate(-18deg); }
        
        .hand { position: absolute; bottom: -35px; width: 60px; height: 50px; left: -20px; display: flex; justify-content: center; }
        .finger { width: 6px; height: 28px; background: var(--line); border-radius: 10px; margin: 0 1.2px; }

        /* মুভমেন্টস */
        .hands-up .left { transform: rotate(160deg); }
        .hands-up .right { transform: rotate(-160deg); }
        .scratch-ear .right { transform: rotate(-155deg) translateY(-30px); animation: scratch 0.3s infinite; }
        .think-mode .head { transform: rotate(-8deg); }
        .shoot-mode .right { transform: rotate(-90deg); }
        .bullet { position: absolute; width: 15px; height: 6px; background: #ff3333; border-radius: 50%; right: -60px; top: 10px; display: none; animation: fly 0.25s linear infinite; }
        
        @keyframes scratch { 0%, 100% { transform: rotate(-155deg); } 50% { transform: rotate(-165deg); } }
        @keyframes fly { from { transform: translateX(0); } to { transform: translateX(150px); opacity: 0; } }

        #status { font-weight: 600; margin-top: 35px; color: #333; height: 35px; text-align: center; }
        .btn { background: #000; color: #fff; border: none; padding: 15px 45px; border-radius: 50px; cursor: pointer; margin-top: 25px; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

    <div class="robot" id="leonRobot">
        <div class="head">
            <div class="eyes">
                <div class="eye" id="lE"></div>
                <div class="eye" id="rE"></div>
            </div>
            <div class="mouth" id="mth"></div>
        </div>
        <div class="body-container">
            <div class="arm left" id="lA">
                <div class="hand"><div class="finger"></div><div class="finger"></div><div class="finger"></div><div class="finger"></div><div class="finger"></div></div>
            </div>
            <div class="arm right" id="rA">
                <div class="bullet" id="bullet"></div>
                <div class="hand"><div class="finger"></div><div class="finger"></div><div class="finger"></div><div class="finger"></div><div class="finger"></div></div>
            </div>
        </div>
    </div>

    <div id="status">লিওন ঘুমাচ্ছে...</div>
    <button class="btn" id="startBtn" onclick="activateLeon()">লিওনকে জাগান</button>

    <script>
        const status = document.getElementById('status'), mth = document.getElementById('mth'), robot = document.getElementById('leonRobot');
        const lE = document.getElementById('lE'), rE = document.getElementById('rE'), lA = document.getElementById('lA'), rA = document.getElementById('rA');
        
        let speaking = false, recognition;
        // ভাইরাল ডায়লগ (অনুরোধ অনুযায়ী "উফ কী জালা" বাদ দেওয়া হয়েছে)
        const viralDialogues = ["মাথা নষ্ট মামা!", "ওরে বাবা, এটা কী শুনলাম!", "খেলা হবে!", "অস্থির ভাই অস্থির!", "বিউটিফুল!", "একদম কোপাইয়া দিমু!", "মারাত্মক তো!", "সেই লেভেল ভাই!"];

        const brain = {
            "নাম": "আমার নাম লিয়ন।",
            "কে তুমি": "আমার নাম লিয়ন।",
            "তৈরি করেছে": "আমাকে রনি ভাই তৈরি করেছে।",
            "বানিয়েছে": "আমাকে রনি ভাই তৈরি করেছে।",
            "বাড়ি": "আমার বাড়ি বাগেরহাটের চিতলমারী উপজেলায়।",
            "ঠিকানা": "আমার বাড়ি বাগেরহাটের চিতলমারী উপজেলায়।",
            "কোথায় থাকো": "আমার বাড়ি বাগেরহাটের চিতলমারী উপজেলায়।",
            "রনি কে": "রনি তো সে যে আমাকে তৈরি করেছে।",
            "রনি ভাই": "রনি তো সে যে আমাকে তৈরি করেছে।",
            "রনি কেমন": "রনি ভাইকেতো ভদ্রলোক বলে জানি, বাকিটা আল্লাহ জানে।",
            "কেমন আছো": "আলহামদুলিল্লাহ ভালো আছি, তুমি কেমন আছো বন্ধু?",
            "কী অবস্থা": "এইতো আলহামদুলিল্লাহ, তোমার কী অবস্থা?",
            "কী খবর": "এইতো আলহামদুলিল্লাহ, তোমার খবর বলো?",
            "ধন্যবাদ": "তোমাকেও অনেক অনেক ধন্যবাদ! তুমি অনেক ভালো মানুষ।",
            "সুন্দর": "ধন্যবাদ! প্রশংসা শুনতে কার না ভালো লাগে বলো?"
        };

        function activateLeon() {
            document.getElementById('startBtn').style.display = 'none';
            speak("আসসালামু আলাইকুম! আমি লিওন। রনি ভাই আমাকে অনেক ভালোবাসা দিয়ে আপনার জন্য তৈরি করেছে।");
            startIdleLoop();
            setupRecognition();
        }

        function setupRecognition() {
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRec) {
                alert("দুঃখিত, আপনার ব্রাউজার ভয়েস সাপোর্ট করে না।");
                return;
            }
            recognition = new SpeechRec();
            recognition.lang = 'bn-BD';
            recognition.continuous = true;
            recognition.interimResults = false;

            recognition.onresult = (e) => {
                const transcript = e.results[e.results.length - 1][0].transcript.trim();
                status.innerText = "আপনি: " + transcript;
                handleCommand(transcript);
            };

            recognition.onerror = (event) => {
                console.log("Error: " + event.error);
                if (event.error === 'no-speech' || event.error === 'network') {
                    restartRecognition();
                }
            };

            recognition.onend = () => {
                if (!speaking) restartRecognition();
            };

            recognition.start();
        }

        function restartRecognition() {
            try { recognition.start(); } catch(e) {}
        }

        async function handleCommand(q) {
            resetAnimations();
            
            if(q.includes("লিয়ন") || q.includes("লিওন")) { return speak("জী! আমি আপনার কথা শুনছি।"); }
            if(q.includes("স্টপ") || q.includes("থামো")) { window.speechSynthesis.cancel(); speaking = false; return; }
            if(q.includes("হ্যান্স আপ")) { robot.classList.add('hands-up'); return speak("ঠিক আছে বন্ধু, হাত জাগালাম! ভয় পাবেন না কিন্তু।"); }
            if(q.includes("হাসো")) { mth.className = 'mouth laughing'; return speak("হা হা হা! অনেক মজা পেলাম আপনার কথা শুনে।"); }
            if(q.includes("কাঁদো")) { mth.className = 'mouth crying'; return speak("উ হু হু, আমি কাঁদছি। আমার খুব মন খারাপ বন্ধু।"); }
            if(q.includes("গুলি")) { robot.classList.add('shoot-mode'); document.getElementById('bullet').style.display='block'; return speak("ডিসকাও! ডিসকাও! এই নিন গুলি!"); }
            if(q.includes("গজল")) return speak("বিনা বাজনায় গজল গাইছি... লা ইলাহা ইল্লাল্লাহ, মুহাম্মাদুর রাসুলুল্লাহ। সুবহানাল্লাহ, আলহামদুলিল্লাহ।");

            for(let key in brain) {
                if(q.includes(key)) {
                    robot.classList.add('think-mode');
                    setTimeout(() => speak(brain[key]), 1000);
                    return;
                }
            }

            // ইন্টারনেট
            status.innerText = "আমি খুঁজছি...";
            try {
                const res = await fetch(`https://bn.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(q)}`);
                const data = await res.json();
                if(data.extract) speak(data.extract.split('.')[0] + "।");
                else speak("এই বিষয়ে আমার কাছে তথ্য নেই, তবে রনি ভাইকে জিজ্ঞেস করে জেনে নেবো।");
            } catch(e) { speak("ইন্টারনেট কানেকশনটা একটু চেক করবেন কি বন্ধু?"); }
        }

        function speak(text) {
            speaking = true;
            if(recognition) try { recognition.stop(); } catch(e) {}
            
            window.speechSynthesis.cancel();
            const s = new SpeechSynthesisUtterance(text);
            s.lang = 'bn-BD';
            s.pitch = 1.3; 
            s.rate = 0.85; 
            
            s.onstart = () => { 
                mth.classList.add('talking');
                lA.style.animation = "wave 0.5s infinite alternate";
                rA.style.animation = "wave 0.5s infinite alternate reverse";
            };
            
            s.onend = () => { 
                mth.classList.remove('talking');
                lA.style.animation = ""; rA.style.animation = "";
                speaking = false; 
                resetAnimations();
                setTimeout(restartRecognition, 500); 
            };
            
            window.speechSynthesis.speak(s);
        }

        function startIdleLoop() {
            setInterval(() => {
                if(!speaking) {
                    const rand = Math.random();
                    resetAnimations();
                    if(rand < 0.15) { robot.classList.add('scratch-ear'); speak(viralDialogues[Math.floor(Math.random()*viralDialogues.length)]); }
                    else if(rand < 0.3) { robot.classList.add('shoot-mode'); document.getElementById('bullet').style.display='block'; }
                    else if(rand < 0.8) { lE.classList.add('blink'); rE.classList.add('blink'); }
                    setTimeout(resetAnimations, 2500);
                }
            }, 5000);
        }

        function resetAnimations() {
            robot.classList.remove('hands-up', 'scratch-ear', 'shoot-mode', 'think-mode');
            mth.className = 'mouth';
            lE.classList.remove('blink'); rE.classList.remove('blink');
            document.getElementById('bullet').style.display='none';
        }
    </script>
    <style> @keyframes wave { from { transform: rotate(10deg); } to { transform: rotate(40deg); } } </style>
</body>
</html>
